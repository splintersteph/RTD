<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanProd — Ordres de fabrication</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF6EF;--surface:#FDFAF6;--surface2:#F5EFE6;
  --border:rgba(100,70,30,.1);--border-med:rgba(100,70,30,.18);
  --text:#2C1A08;--text-muted:#8A7060;--text-faint:#B4A080;
  --accent:#BA7517;--accent-light:#FAEEDA;--accent-text:#633806;
  --font:'Inter',system-ui,sans-serif;
  --radius:8px;--radius-lg:12px;--sidebar:220px;
  --c-creation-bg:#EFF5FC;--c-creation-text:#185FA5;--c-creation-border:#B5D4F4;
  --c-attente-bg:#F5F3EE;--c-attente-text:#5F5E5A;--c-attente-border:#D3CFC7;
  --c-usinage-bg:#FEF5E7;--c-usinage-text:#633806;--c-usinage-border:#FAC775;
  --c-controle-bg:#F3F0FE;--c-controle-text:#3C3489;--c-controle-border:#C5C0F0;
  --c-joint-bg:#EBF8F3;--c-joint-text:#085041;--c-joint-border:#9FE1CB;
  --c-blister-bg:#FDF0F5;--c-blister-text:#72243E;--c-blister-border:#F4C0D1;
  --c-boite-bg:#EFF8E4;--c-boite-text:#27500A;--c-boite-border:#C0DD97;
  --prio-haute-bg:#FCEBEB;--prio-haute-text:#A32D2D;
  --prio-normale-bg:#FEF5E7;--prio-normale-text:#633806;
  --prio-basse-bg:#F5F3EE;--prio-basse-text:#5F5E5A;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.alert-banner{display:none;align-items:center;gap:12px;padding:10px 24px;background:#FCEBEB;border-bottom:1px solid #F0BABA;color:#7A1F1F;font-size:13px;flex-shrink:0}
.alert-banner.show{display:flex}
.alert-banner i{font-size:18px;color:#A32D2D;flex-shrink:0}
.alert-banner strong{font-weight:600}
.alert-banner-list{display:flex;flex-wrap:wrap;gap:6px;margin-left:4px}
.alert-chip{background:#fff;border:1px solid #F0BABA;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:500;cursor:pointer;color:#A32D2D}
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:#00C8C8;font-family:monospace;letter-spacing:.04em}
.topbar-logo i{font-size:20px}
.topbar-divider{width:1px;height:24px;background:var(--border)}
.topbar-search{flex:1;max-width:320px;position:relative}
.topbar-search i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:16px}
.topbar-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:#C8E0F0;font-size:13px;font-family:var(--font);outline:none}
.topbar-search input:focus{border-color:#00C8C8;box-shadow:0 0 0 2px rgba(0,200,200,.1)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-date{font-size:12px;color:var(--text-muted)}
.save-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);padding:5px 10px;border-radius:var(--radius);border:1px solid transparent;transition:all .3s}
.save-status.saving{color:#185FA5;border-color:#B5D4F4;background:#E6F1FB}
.save-status.saved{color:#27500A;border-color:#C0DD97;background:#EAF3DE}
.save-status.error{color:#A32D2D;border-color:#F4C0D1;background:#FCEBEB}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.sidebar-section{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px;margin-top:8px}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text-muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s}
.sidebar-item:hover{background:var(--bg);color:var(--text)}
.sidebar-item.active{background:var(--border);color:#00C8C8;font-weight:500;border-left:2px solid #00C8C8;border-radius:0 6px 6px 0;padding-left:8px}
.sidebar-item i{font-size:17px;flex-shrink:0}
.sidebar-badge{margin-left:auto;font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--border);color:var(--text-muted)}
.sidebar-item.active .sidebar-badge{background:rgba(0,200,200,.2);color:#00C8C8}
.sidebar-badge.alert{background:#FCEBEB;color:#A32D2D}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.toolbar{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;flex-wrap:wrap}
.toolbar h1{font-size:16px;font-weight:600;color:#C8E0F0;font-family:monospace;letter-spacing:.02em}
.toolbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:var(--surface);color:#5A7080;transition:background .1s,color .1s;white-space:nowrap}
.btn:hover{background:var(--surface2);color:#C8E0F0}
.btn i{font-size:15px}
.btn-primary{background:#00C8C8;color:var(--bg);border-color:#00C8C8;font-weight:700}
.btn-primary:hover{background:#00E0E0;border-color:#00E0E0}
.btn-danger{color:#A32D2D}
.btn-danger:hover{background:#FCEBEB;border-color:#F0959580}
.btn-archive{color:#27500A;border-color:#C0DD97;background:#EAF3DE}
.filter-select{padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border-med);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;outline:none}
.stats-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;padding:12px 20px;background:var(--surface);display:flex;align-items:center;gap:12px;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00C8C8,transparent)}
.stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-num{font-size:22px;font-weight:700;line-height:1;color:#C8E0F0;font-family:monospace}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.content{flex:1;display:flex;flex-direction:column}
.kanban{display:flex;flex:1;overflow-x:auto}
.kanban-col{flex:1;min-width:180px;max-width:240px;display:flex;flex-direction:column;border-right:1px solid rgba(0,200,200,.06)}
.kanban-col:last-child{border-right:none}
.kanban-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.kanban-head-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
.kanban-head-count{font-size:11px;color:var(--text-muted);margin-top:2px;padding-left:19px}
.kanban-body{padding:8px;display:flex;flex-direction:column;gap:5px}
.kanban-col.drag-over .kanban-body{background:var(--accent-light);outline:2px dashed var(--accent);outline-offset:-2px;border-radius:8px}
.of-card{background:var(--surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:11px 12px;cursor:pointer;transition:box-shadow .12s,transform .1s,border-color .1s;border-left-width:3px;position:relative}
.of-card:hover{box-shadow:0 4px 20px rgba(0,200,200,.1);transform:translateY(-1px);border-color:rgba(0,200,200,.2)}
.of-card.blocked{border-color:#F0BABA;box-shadow:0 0 0 1px #F0BABA}
.of-card.dragging{opacity:.35;transform:scale(.96);pointer-events:none}
.of-ref{font-size:10px;font-weight:500;color:var(--text-faint)}
.of-client-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-bottom:4px}
.of-produit{font-size:14px;font-weight:600;color:var(--text);margin:2px 0 0;line-height:1.3}
.of-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.of-qty{font-size:11px;color:var(--text-muted)}
.prio-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.of-deadline{font-size:9px;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:5px;white-space:nowrap}
.of-deadline.late{background:#FCEBEB;color:#A32D2D}
.of-deadline.soon{background:#FAEEDA;color:#633806}
.of-deadline.ok{background:#EAF3DE;color:#27500A}
.of-deadline.unknown{background:var(--bg);color:var(--text-faint)}
.blocked-badge{position:absolute;top:8px;right:8px;background:#A32D2D;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;display:flex;align-items:center;gap:3px}
.list-view{flex:1;overflow-y:auto;padding:16px 24px;display:none;flex-direction:column;gap:6px}
.list-header{display:grid;grid-template-columns:110px 80px 1fr 130px 70px 80px 90px 130px 40px;gap:10px;padding:8px 16px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;cursor:pointer}
.list-row{display:grid;grid-template-columns:110px 80px 1fr 130px 70px 80px 90px 130px 40px;gap:10px;align-items:center;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;transition:background .1s}
.list-row:hover{border-color:var(--border-med);background:var(--surface2)}
.list-row.blocked{border-color:#F0BABA}
.of-ref-tag{font-size:12px;font-weight:600;color:var(--accent)}
.stage-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}
.deadline-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}
.flex-view{flex:1;overflow-y:auto;padding:16px 24px;display:none;flex-direction:column;gap:16px}
.overlay{display:none;position:fixed;inset:0;background:rgba(44,26,8,.4);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border-med);width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 80px rgba(0,0,0,.6)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:16px;font-weight:600}
.modal-body{padding:20px 24px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}
.progress-wrap{margin:0 0 16px}
.progress-steps{display:flex;position:relative;margin:8px 0 0}
.progress-steps::before{content:'';position:absolute;top:11px;left:12px;right:12px;height:2px;background:var(--border);z-index:0}
.ps{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
.ps-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);background:var(--surface);color:var(--text-faint)}
.ps-dot.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
.ps-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ps-label{font-size:9px;text-align:center;margin-top:5px;color:var(--text-faint);max-width:52px;line-height:1.3}
.ps-label.active{color:var(--accent);font-weight:600}
.stage-timeline{margin:8px 0 16px;display:flex;flex-direction:column;gap:5px}
.st-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;border:1px solid var(--border)}
.st-row.active-stage{border-color:var(--accent);background:var(--accent-light)}
.st-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.st-label{font-size:12px;font-weight:500;flex:1}
.st-duration{font-size:11px;color:var(--text-muted)}
.st-date{font-size:11px;font-weight:500;margin-left:auto;padding:2px 8px;border-radius:20px}
.st-date.late{background:#FCEBEB;color:#A32D2D}
.st-date.soon{background:#FAEEDA;color:#633806}
.st-date.ok{background:#EAF3DE;color:#27500A}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.dg-item label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
.dg-item p{font-size:14px;color:var(--text);margin-top:3px}
.note-box{background:var(--bg);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text-muted);margin-bottom:16px;border:1px solid var(--border);font-style:italic}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:500;color:var(--text-muted)}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:#C8E0F0;font-size:13px;font-family:var(--font);outline:none;transition:border-color .12s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#00C8C8;box-shadow:0 0 0 2px rgba(0,200,200,.1)}
.form-group textarea{resize:vertical;min-height:60px}
.tc-hint{font-size:11px;color:var(--accent);margin-top:3px;min-height:16px}
.autocomplete-wrap{position:relative}
.autocomplete-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:500;max-height:220px;overflow-y:auto;display:none}
.autocomplete-dropdown.open{display:block}
.ac-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.ac-item:last-child{border-bottom:none}
.ac-item:hover,.ac-item.selected{background:var(--accent-light)}
.ac-ref{font-size:13px;font-weight:500;color:var(--text);flex:1}
.ac-ref mark{background:transparent;color:var(--accent);font-weight:700}
.ac-client{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0}
.ac-tc{font-size:11px;color:var(--text-faint);flex-shrink:0}
.ac-empty{padding:14px;text-align:center;font-size:13px;color:var(--text-faint)}
.close-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;display:flex;align-items:center;padding:4px;border-radius:6px;transition:background .1s}
.close-btn:hover{background:var(--bg)}
.step-nav{display:flex;gap:8px;flex-wrap:wrap}
.step-nav .spacer{flex:1}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-muted);font-size:14px;padding:40px}
.empty i{font-size:40px;color:var(--text-faint)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#00C8C8;color:var(--bg);font-weight:600;padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,200,200,.3)}
.toast.show{opacity:1}
.prog-bar{height:10px;border-radius:5px;background:var(--border);overflow:hidden;margin:6px 0}
.prog-fill{height:100%;border-radius:5px;transition:width .4s ease}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s}
.ref-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.ref-card.complete{border-color:#C0DD97;background:linear-gradient(135deg,#FAFFF6,var(--surface))}
.cat-table{width:100%;border-collapse:collapse;font-size:13px}
.cat-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
.cat-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.cat-table tr:hover td{background:var(--bg)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px}

/* ─── MOBILE ──────────────────────────────────────────────────────────────── */
@media(max-width:768px){
  body{overflow:hidden}

  /* Sidebar cachée, remplacée par une bottom nav */
  .sidebar{display:none}

  /* Topbar compacte */
  .topbar{padding:0 12px;height:48px;gap:8px}
  .topbar-logo span{display:none}
  .topbar-date{display:none}
  .topbar-search{max-width:none;flex:1}
  .save-status span{display:none}

  /* Toolbar compacte */
  .toolbar{padding:8px 12px;gap:6px}
  .toolbar h1{font-size:14px}
  .toolbar-actions{gap:6px}
  .toolbar-actions .filter-select:first-child{display:none} /* cacher tri */
  #sort-dir-btn{display:none}

  /* Stats bar en 2x2 */
  .stats-bar{display:grid;grid-template-columns:1fr 1fr;gap:1px}
  .stat{padding:8px 12px}
  .stat-num{font-size:18px}
  .stat-label{font-size:10px}
  .stat-icon{width:28px;height:28px;font-size:14px}

  /* Kanban : une colonne à la fois */
  .kanban{flex-direction:column;overflow-x:hidden;overflow-y:auto}
  .kanban-col{min-width:unset;max-width:unset;border-right:none;border-bottom:1px solid var(--border);display:none}
  .kanban-col.mobile-active{display:flex}

  /* Cartes plus grandes */
  .of-card{padding:14px}
  .of-produit{font-size:14px}
  .of-qty{font-size:12px}

  /* Navigation entre colonnes kanban */
  .kanban-mobile-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .kanban-mobile-nav button{background:none;border:1px solid var(--border-med);border-radius:var(--radius);padding:6px 14px;cursor:pointer;color:var(--text);font-family:var(--font);font-size:13px}
  .kanban-mobile-nav button:disabled{opacity:.3;cursor:default}
  .kanban-mobile-stage{font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}

  /* Liste simplifiée */
  .list-header{display:none}
  .list-row{grid-template-columns:1fr auto;gap:8px;padding:12px}
  .list-row > span:nth-child(3),.list-row > span:nth-child(4),
  .list-row > span:nth-child(5),.list-row > span:nth-child(7),
  .list-row > span:nth-child(9){display:none}

  /* Bottom nav */
  .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--surface);border-top:1px solid var(--border);z-index:100;justify-content:space-around;align-items:center}
  .bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 12px;border-radius:8px;font-size:10px;color:var(--text-muted);border:none;background:none;font-family:var(--font)}
  .bottom-nav-item i{font-size:20px}
  .bottom-nav-item.active{color:var(--accent)}

  /* Décaler le contenu pour la bottom nav */
  .main{padding-bottom:56px}
  .content{padding-bottom:0}

  /* Modal plein écran sur mobile */
  .modal{width:100%;max-width:100%;height:100vh;max-height:100vh;border-radius:0;margin:0}
  .overlay{align-items:flex-end}

  /* Vues flex */
  .flex-view{padding:12px}
}

/* Desktop : cacher la bottom nav */
@media(min-width:769px){
  .bottom-nav{display:none}
  .kanban-mobile-nav{display:none}
}

@media(max-width:768px){
  .alert-banner{padding:8px 12px;font-size:12px;flex-wrap:wrap;gap:6px;max-height:80px;overflow-y:auto}
  .alert-banner-list{gap:4px}
  .alert-chip{font-size:10px;padding:2px 8px}
  .alert-banner strong{font-size:12px}
}

  /* GANTT */
  .gantt-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}

N4":"ULTRADENT"};
const CLIENT_MAP = {
  "3M":            {bg:"#E6F1FB",text:"#0C447C",dot:"#4C8EDA"},
  "APOL":          {bg:"#EEF4FF",text:"#1A3A8F",dot:"#3B6FD4"},

};
const DEFAULT_CLIENT = {bg:"#F1EFE8",text:"#444441",dot:"#888780"};

let customClients = {};

function allClients() { return Object.assign({}, CLIENT_MAP, customClients); }

function detectClient(ref) {
  if (!ref) return null;
  const r = ref.trim(), rL = r.toLowerCase().replace(/\s+/g," ");
  if (REF_CLIENT_MAP[r]) return REF_CLIENT_MAP[r];
  for (const [k,v] of Object.entries(REF_CLIENT_MAP)) {
    if (k.toLowerCase() === rL || rL.includes(k.toLowerCase())) return v;
  }
  const ru = r.toUpperCase().replace(/\s+/g,"");
  if (/^W\d/.test(ru)) return "3M";
  if (ru.startsWith("RS")) return "APOL";
  if (ru.startsWith("K")) return "BRASSELER";
  if (ru.startsWith("PF")) return "GC";
  if (/^S\d/.test(ru)) return "MAILLEFER";
  if (ru.startsWith("AD")||ru.startsWith("AE")||ru.startsWith("ML")) return "RTD";
  // Noms complets RTD (MACROLOCK, MATCHPOST, DT LIGHT POST, ENDO LIGHT POST, AI3...)
  const rLow = r.toLowerCase();
  if (rLow.includes('macrolock')||rLow.includes('matchpost')||rLow.includes('dt light post')||
      rLow.includes('endo light post')||rLow.includes('h-dt light')||rLow.startsWith('ai')||
      /^\d+sg_jtr/i.test(r)) return "RTD";
  if (ru.startsWith("AH")) return "SHOFU";
  if (/^\d+_JAR/.test(r)||/^\d+ JAR$/i.test(r.trim())) return "TOKUYAMA";
  if (ru.startsWith("L0")) return "TULSA DENTSPLY";
  if (/^N\d/.test(ru)) return "ULTRADENT";
  return null;
}

function detectClientFull(ref, archiveObj) {
  if (!ref) return null;
  // Si l'archive a un client forcé manuellement
  if (archiveObj?._clientOverride) return archiveObj._clientOverride;
  for (const [name,cfg] of Object.entries(customClients)) {
    if ((cfg.prefixes||[]).some(p => ref.toUpperCase().startsWith(p.toUpperCase()))) return name;
  }
  return detectClient(ref);
}

function clientStyle(ref) {
  const c = detectClientFull(ref);
  const all = allClients();
  return (c && all[c]) ? all[c] : DEFAULT_CLIENT;
}

function loadEmbedded() {
  try {
    const tag = document.getElementById('initial-data');
    if (!tag) return;
    const d = JSON.parse(tag.textContent);
    ofs = d.ofs||[]; archives = d.archives||[];
    nextId = d.nextId||1; catalogue = d.catalogue||[]; objectifs3m = d.objectifs_3m||{};
    machines = d.machines || initMachines();
    if(d.durees_etapes){Object.assign(DUREES_ETAPES,d.durees_etapes);Object.assign(parametres.durees,d.durees_etapes);}
    const ids = new Set(ofs.map(o=>o.id));
    archives = archives.filter(a=>!ids.has(a.id));
  } catch(e) { console.warn('loadEmbedded:', e); }
}

function setSaveStatus(s,msg) {
  const el=document.getElementById('save-status');
  el.className='save-status '+s;
  document.getElementById('save-label').textContent=msg;
  const icons={saving:'ti-cloud-upload',saved:'ti-cloud-check',error:'ti-cloud-off'};
  el.querySelector('i').className='ti '+(icons[s]||'ti-cloud');
}

async function loadData() {
  loadEmbedded();
  try {
    const res = await fetch(API,{signal:AbortSignal.timeout(4000)});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    ofs=d.ofs||[]; archives=d.archives||[]; nextId=d.nextId||1;
    catalogue=d.catalogue||[]; objectifs3m=d.objectifs_3m||{};
    machines=d.machines||initMachines();
    if(d.durees_etapes){Object.assign(DUREES_ETAPES,d.durees_etapes);Object.assign(parametres.durees,d.durees_etapes);}
    const ids=new Set(ofs.map(o=>o.id)); archives=archives.filter(a=>!ids.has(a.id));
    serverAvailable=true; setSaveStatus('saved','Synchronisé');
  } catch(e) {
    serverAvailable=false; setSaveStatus('error','Hors ligne');
  }
  render();
}

function scheduleSave() {
  if (!serverAvailable) return;
  clearTimeout(saveTimeout); setSaveStatus('saving','Sauvegarde…');
  saveTimeout = setTimeout(async()=>{
    try {
      const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ofs,archives,nextId,catalogue,objectifs_3m:objectifs3m,machines,durees_etapes:DUREES_ETAPES}),
        signal:AbortSignal.timeout(5000)});
      if (!res.ok) throw new Error();
      setSaveStatus('saved','Sauvegardé');
      setTimeout(()=>setSaveStatus('saved','Synchronisé'),2000);
    } catch { setSaveStatus('error','Échec sauvegarde'); }
  },800);
}

function getMachineOrder() {
  // Machines dans l'ordre défini + celles hors liste à la fin
  const fromMachines = machines.map(m=>m.name);
  const ordered = MACHINE_ORDER.filter(m => fromMachines.includes(m) || ofs.some(o=>o.machine===m));
  const others = [...new Set(ofs.map(o=>o.machine).filter(m=>m&&!ordered.includes(m)))].sort();
  const noMachine = ofs.some(o=>!o.machine) ? ['Non assigné'] : [];
  return [...ordered, ...others, ...noMachine];
}

function renderGantt() {
  const el = document.getElementById('view-gantt');

  const today = new Date(); today.setHours(0,0,0,0);

  const ofsActifs = ganttShowArchived
    ? archives.filter(a => a.archivedAt)
    : ofs.filter(o => STAGES_GANTT.includes(o.stage));

  const machineOrder = getMachineOrder();

  // Regrouper les OF par machine
  const byMachine = {};
  machineOrder.forEach(m => { byMachine[m] = []; });
  ofsActifs.forEach(o => {
    const m = o.machine || 'Non assigné';
    if (!byMachine[m]) byMachine[m] = [];
    byMachine[m].push(o);
  });

  // Plage de dates
  let minDate = new Date(today); minDate.setDate(minDate.getDate()-5);
  let maxDate = new Date(today); maxDate.setDate(maxDate.getDate()+60);
  ofs.forEach(o => {
    const {dates} = calcDates(o);
    if (o.date) { const d=new Date(o.date+'T00:00:00'); if(d<minDate) minDate=new Date(d); }
    if (dates.boite) { const d=new Date(dates.boite+'T00:00:00'); if(d>maxDate) maxDate=new Date(d); }
  });

  // Colonnes
  const cols = []; 
  const cur = new Date(minDate);
  while (cur <= maxDate) {
    cols.push(new Date(cur));
    if (ganttZoom==='day') cur.setDate(cur.getDate()+1);
    else cur.setDate(cur.getDate()+7);
  }
  _ganttCols = [...cols];

  const colW   = ganttZoom==='day' ? 30 : 90;
  const labelW = 110;
  const rowH   = 48;
  const totalW = labelW + cols.length * colW;

  // En-tête mois
  const months = [];

    if (!months.length || months[months.length-1].key!==key)

    else months[months.length-1].count++;

  // En-tête jours
  const dayHeader = cols.map((d,i) => {
    const isWeekend = d.getDay()===0||d.getDay()===6;
    const isToday   = d.toDateString()===today.toDateString();
    const isMonday  = d.getDay()===1&&ganttZoom==='day';
    const label = ganttZoom==='day'
      ? `<span style="font-size:8px;opacity:.7">${['D','L','M','M','J','V','S'][d.getDay()]}</span><br>${d.getDate()}`
      : `S${getWeekNum(d)}<br>${d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})}`;
    return `<div style="position:absolute;left:${i*colW}px;width:${colW}px;text-align:center;font-size:10px;font-weight:${isToday||isMonday?700:400};color:${isToday?'var(--accent)':isMonday?'var(--accent-text)':'var(--text-faint)'};background:${isToday?'rgba(186,117,23,.08)':isWeekend?'rgba(0,0,0,.025)':'transparent'};border-left:${isMonday?'2px solid rgba(186,117,23,.4)':'1px solid var(--border)'};padding:2px 0;line-height:1.3;box-sizing:border-box">${label}</div>`;
  }).join('');

  // Ligne de today

  // Lignes par machine

    // Barres des OF

      const endDate = endRaw ? new Date(endRaw+'T00:00:00') : (startDate?new Date(startDate.getTime()+86400000*2):null);
      if (!startDate||!endDate) return '';

      const right = dateToPx(endDate,   cols, colW, labelW, ganttZoom) - labelW;

      const label = `${o.id.replace('OF-','')} — ${o.produit} · ${(o.qty/1000).toFixed(0)}k`;
      return `<div class="gantt-bar" data-id="${o.id}"
        title="${o.id} — ${o.produit} (${o.qty.toLocaleString('fr')} u.)"
        style="position:absolute;left:${left}px;width:${width}px;top:6px;height:${rowH-12}px;
          background:${isBlocked?'#FCEBEB':cs.bg};
          border:1px solid ${isBlocked?'#F0BABA':cs.dot};
          border-left:3px solid ${cs.dot};
          color:${cs.text};font-size:10px;font-weight:600;
          border-radius:5px;cursor:grab;display:flex;align-items:center;
          padding:0 8px;white-space:nowrap;overflow:hidden;z-index:1;

        ontouchstart="ganttMoveStart(event,'${o.id}')">
        <span style="overflow:hidden;text-overflow:ellipsis;pointer-events:none">${label}</span>
        <span style="position:absolute;left:0;top:0;bottom:0;width:6px;cursor:w-resize;z-index:2"
          onmousedown="event.stopPropagation();ganttResizeStart(event,'${o.id}','left')"
          ontouchstart="event.stopPropagation();ganttResizeStart(event,'${o.id}','left')"></span>
        <span style="position:absolute;right:0;top:0;bottom:0;width:6px;cursor:e-resize;z-index:2"
          onmousedown="event.stopPropagation();ganttResizeStart(event,'${o.id}','right')"
          ontouchstart="event.stopPropagation();ganttResizeStart(event,'${o.id}','right')"></span>
      </div>`;
    }).join('');

    if (!machineOfs.length) return ''; // cacher les machines sans OF

    return `
      <div style="display:flex;height:${rowH}px;background:${rowBg};border-bottom:1px solid var(--border)">
        <div style="width:${labelW}px;flex-shrink:0;padding:0 10px;display:flex;align-items:center;border-right:2px solid var(--border);position:sticky;left:0;background:${rowBg};z-index:2">
          <div>
            <div style="font-size:12px;font-weight:600;color:${isPanne?'var(--text-faint)':'var(--text)'}${isPanne?';text-decoration:line-through':''}">${machine}</div>
            ${isPanne?'<div style="font-size:9px;color:#A32D2D;font-weight:600">⚠ EN PANNE</div>':''}
            <div style="font-size:9px;color:var(--text-faint)">${machineOfs.length} OF</div>
          </div>
        </div>
        <div style="flex:1;position:relative;overflow:hidden">
          ${bgCells}
          ${bars}
        </div>
      </div>`;
  }).filter(Boolean).join('');

  el.innerHTML = `
    <div style="flex:1;overflow:auto" id="gantt-scroll">
      <div style="display:flex;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;flex-shrink:0">
        <div style="display:flex;border:1px solid var(--border-med);border-radius:var(--radius);overflow:hidden">
          <button style="background:${ganttZoom==='day'?'var(--accent)':'transparent'};color:${ganttZoom==='day'?'#fff':'var(--text-muted)'};border:none;padding:5px 14px;cursor:pointer;font-size:12px;font-family:var(--font)" onclick="setGanttZoom('day')">Jour</button>

        </div>
        <span style="font-size:12px;color:var(--text-muted)">${ofsActifs.length} OF · ${machineOrder.filter(m=>byMachine[m]?.length).length} machines actives</span>

function ganttScrollToday() {
  const scroll = document.getElementById('gantt-scroll');
  if (!scroll) return;
  const colW = ganttZoom==='day'?30:90;
  const today = new Date(); today.setHours(0,0,0,0);
  const x = dateToPx(today, _ganttCols, colW, 110, ganttZoom);
  scroll.scrollLeft = Math.max(0, x - 250);
}


function dateToPx(date, cols, colW, labelW, zoom) {
  if (!date) return labelW;
  for (let i=0; i<cols.length; i++) {
    const c = cols[i];
    const next = new Date(c);
    if (zoom==='day') next.setDate(next.getDate()+1);
    else next.setDate(next.getDate()+7);
    if (date >= c && date < next) {
      const frac = (date-c)/(next-c);
      return labelW + i*colW + frac*colW;
    }
  }
  if (date < cols[0]) return labelW;
  return labelW + cols.length * colW;
}

function getWeekNum(d) {
  const date = new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum = date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}

function setGanttZoom(z) {
  ganttZoom = z;
  renderGantt();
}

let machines = [];

function initMachines() {
  return [
    'BOL 1','BOL 2','BOL 3','BOL 4',
    'DECO10','DELTA 1','DELTA 2',
    'GENX 1','GENX 2','GENX 3','GENX 4','GENX 5','GENX 6','GENX 7','GENX 8'
  ].map(name => ({name, status:'active'}));
}

function getMachineList() {
  // Retourner uniquement les machines actives
  const base = machines.filter(m => m.status === 'active').map(m => m.name);
  // Ajouter celles des OF existants qui ne seraient pas dans le parc
  const fromOfs = [...new Set(ofs.map(o=>o.machine).filter(Boolean))];
  const all = [...new Set([...base, ...fromOfs.filter(m => {
    const found = machines.find(x=>x.name===m);
    return !found || found.status === 'active';
  })])].sort();
  return all;
}

function getMachinesForRef(ref) {
  if (!ref) return getMachineList();
  const entry = lookupCatalogueEntry(ref);
  if (!entry || !entry.machine) return getMachineList();
  const base = entry.machine.toUpperCase();
  const expanded = getMachineList().filter(m => {
    const mb = m.toUpperCase();
    return base.split('/').some(b => mb.startsWith(b.trim()));
  });
  return expanded.length ? expanded : getMachineList();
}

function toggleMachine(idx) {
  if (!machines[idx]) return;
  machines[idx].status = machines[idx].status === 'active' ? 'panne' : 'active';
  scheduleSave();
  openParametres();
}

function renameMachine(idx) {
  const m = machines[idx]; if (!m) return;
  const name = prompt('Nouveau nom pour la machine :', m.name);
  if (name && name.trim()) {
    // Mettre à jour les OF qui utilisent cette machine
    ofs.forEach(o => { if (o.machine === m.name) o.machine = name.trim(); });
    m.name = name.trim();
    scheduleSave();
    openParametres();
    showToast('Machine renommée');
  }
}

function deleteMachine(idx) {
  const m = machines[idx]; if (!m) return;
  const inUse = ofs.filter(o => o.machine === m.name).length;
  const msg = inUse > 0
    ? `Cette machine est utilisée par ${inUse} OF en cours. Supprimer quand même ?`
    : `Supprimer la machine "${m.name}" ?`;
  if (!confirm(msg)) return;
  machines.splice(idx, 1);
  scheduleSave();
  openParametres();
}

function addMachine() {
  const inp = document.getElementById('new-machine-name');
  const name = inp?.value.trim();
  if (!name) { inp?.focus(); return; }
  if (machines.find(m => m.name === name)) {
    alert('Cette machine existe déjà.');
    return;
  }
  machines.push({name, status:'active'});
  if (inp) inp.value = '';
  scheduleSave();
  openParametres();
  showToast(`Machine "${name}" ajoutée`);
}



function updateMachineFromRef() {

  const hint = document.getElementById('machine-hint');
  if (!machineSelect) return;

  const current = machineSelect.value;
  machineSelect.innerHTML = '<option value="">— Sélectionner —</option>' +
    getMachineList().map(m => {

// Trouver la prochaine date disponible sur une machine (après le dernier OF en cours)
function getNextAvailableDate(machine, startDate) {
  if (!machine || !startDate) return startDate;
  // Trouver tous les OF sur cette machine
  const ofsOnMachine = ofs.filter(o => o.machine === machine && o.id !== editingId);
  if (!ofsOnMachine.length) return startDate;
  // Trouver la date de fin d'usinage la plus tardive
  let latestEnd = startDate;
  ofsOnMachine.forEach(o => {
    const {dates} = calcDates(o);
    const finUsinage = dates.usinage;
    if (finUsinage && finUsinage > latestEnd) latestEnd = finUsinage;
  });
  return latestEnd;
}


// ─── CALCULS DATES ────────────────────────────────────────────────────────────
function lookupTC(ref) {
  if (!ref) return null;
  const e = lookupCatalogueEntry(ref);
  return (e && e.tc) ? e.tc : null;
}

function addJoursOuvres(dateStr, heures) {
  if (!dateStr||heures===null||heures===undefined) return null;
  let j=Math.ceil(heures/HEURES_PAR_JOUR);
  let d=new Date(dateStr+'T12:00:00'), a=0;
  while(a<j){d.setDate(d.getDate()+1);if(d.getDay()!==0)a++;}
  return d.toISOString().slice(0,10);
}

function calcDates(of) {
  const tc=lookupTC(of.produit);
  const dH={creation:0,attente:0,usinage:tc?(of.qty*tc)/3600:null,
    controle:DUREES_ETAPES.controle,joint:DUREES_ETAPES.joint,blister:DUREES_ETAPES.blister,boite:DUREES_ETAPES.boite};
  const dates={};let cur=of.date;
  for(const s of STAGES){
    // Vérifier si une date manuelle existe pour cette étape
    const override = of['dateOverride_'+s.id];
    if(override){
      dates[s.id]=override;
      cur=override;
      continue;
    }
    const h=dH[s.id];
    if(h===null||h===undefined){dates[s.id]=null;}
    else if(h===0){dates[s.id]=cur;}
    else{const f=addJoursOuvres(cur,h);dates[s.id]=f;cur=f||cur;}
  }
  return {dates,tc,dH};
}

function deadlineStatus(d, stage){
  if(!d)return'unknown';
  // Seul le Contrôle peut être marqué en retard
  if(stage !== 'controle') return 'ok';
  const t=new Date();t.setHours(0,0,0,0);
  const diff=(new Date(d+'T00:00:00')-t)/86400000;
  if(diff<0)return'late';if(diff<=3)return'soon';return'ok';
}

function joursEnAttente(of) {
  if (of.stage !== 'attente') return null;
  const enteredAt = of.stageEnteredAt?.attente || of.date;
  if (!enteredAt) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((t - new Date(enteredAt+'T00:00:00')) / 86400000);
  return diff >= 0 ? diff : 0;
}

function isBlocked(of){
  const {dates}=calcDates(of);
  const f=dates[of.stage];
  return f&&deadlineStatus(f)==='late';
}

function dureeFmt(h){
  if(h===null||h===undefined)return'?';if(h===0)return'immédiat';
  const j=Math.floor(h/HEURES_PAR_JOUR),r=Math.round(h%HEURES_PAR_JOUR*10)/10;
  if(j===0)return r+'h';if(r===0)return j+'j';return j+'j '+r+'h';
}

// ─── TRI ──────────────────────────────────────────────────────────────────────
function setSort(field){
  if(sortField===field)sortDir*=-1;else{sortField=field;sortDir=1;}
  const b=document.getElementById('sort-dir-btn');
  if(b)b.innerHTML=sortDir===1?'<i class="ti ti-sort-ascending"></i>':'<i class="ti ti-sort-descending"></i>';
  document.getElementById('sort-field').value=field;render();
}
function toggleSortDir(){sortDir*=-1;const b=document.getElementById('sort-dir-btn');if(b)b.innerHTML=sortDir===1?'<i class="ti ti-sort-ascending"></i>':'<i class="ti ti-sort-descending"></i>';render();}
function sortedOfs(data){
  if(!sortField)return data;
  return [...data].sort((a,b)=>{
    let va,vb;
    if(sortField==='id'){va=parseInt(a.id.replace('OF-',''))||0;vb=parseInt(b.id.replace('OF-',''))||0;}
    else if(sortField==='date'){va=a.date||'';vb=b.date||'';}
    else if(sortField==='deadline'){va=calcDates(a).dates[a.stage]||'9999';vb=calcDates(b).dates[b.stage]||'9999';}
    else if(sortField==='produit'){va=a.produit.toLowerCase();vb=b.produit.toLowerCase();}
    else if(sortField==='client'){va=(detectClientFull(a.produit)||'').toLowerCase();vb=(detectClientFull(b.produit)||'').toLowerCase();}
    else if(sortField==='machine'){va=(a.machine||'').toLowerCase();vb=(b.machine||'').toLowerCase();}
    else if(sortField==='qty'){va=a.qty||0;vb=b.qty||0;}
    else if(sortField==='prio'){const ord={haute:0,normale:1,basse:2};va=ord[a.prio]??1;vb=ord[b.prio]??1;}
    else return 0;
    return va<vb?-1*sortDir:va>vb?1*sortDir:0;
  });
}

function dragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>e.target.classList.add('dragging'),0);}
function dragEnd(e){e.target.classList.remove('dragging');document.querySelectorAll('.kanban-col').forEach(c=>c.classList.remove('drag-over'));}
function dragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function dragLeave(e){if(!e.currentTarget.contains(e.relatedTarget))e.currentTarget.classList.remove('drag-over');}
function dragDrop(e,stageId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(!dragId)return;
  const o=ofs.find(x=>x.id===dragId);
  if(!o||o.stage===stageId)return;
  o.stage=stageId;if(!o.stageEnteredAt)o.stageEnteredAt={};
  o.stageEnteredAt[stageId]=todayStr();dragId=null;render();scheduleSave();
}

function filteredOfs(){
  const search=document.getElementById('search').value.toLowerCase();
  const prio=document.getElementById('filter-prio').value;
  const filtered=ofs.filter(o=>{
    if(search&&!o.id.toLowerCase().includes(search)&&!o.produit.toLowerCase().includes(search))return false;
    if(prio&&o.prio!==prio)return false;
    if(sideFilter==='haute'&&o.prio!=='haute')return false;
    if(sideFilter==='basse'&&o.prio!=='basse')return false;
    if(sideFilter==='bloque'&&!isBlocked(o))return false;
    if(stageFilter&&o.stage!==stageFilter)return false;
    return true;
  });
  return sortedOfs(filtered);
}

// ─── 3M ───────────────────────────────────────────────────────────────────────
function trouverRef3M(produit){
  if(!produit)return null;
  const pU=produit.trim().toUpperCase().replace(/\s+/g,'');
  const sorted=catalogue.filter(c=>c.client==='3M').sort((a,b)=>b.ref.length-a.ref.length);
  for(const c of sorted){
    const r=c.ref.trim().toUpperCase().replace(/\s+/g,'');
    if(pU===r||pU.startsWith(r)||pU.includes(r))return c.ref;
  }
  for(const ref of Object.keys(objectifs3m)){
    const r=ref.trim().toUpperCase().replace(/\s+/g,'');
    if(pU===r||pU.startsWith(r))return ref;
  }
  return null;
}

function get3MData(){
  const refsFromCat=catalogue.filter(c=>c.client==='3M').map(c=>c.ref);
  const refsFromObj=Object.keys(objectifs3m);
  const refs3m=[...new Set([...refsFromCat,...refsFromObj])].sort();
  refs3m.forEach(r=>{if(objectifs3m[r]===undefined)objectifs3m[r]=0;});
  const ofsEnCours=ofs.filter(o=>detectClientFull(o.produit)==='3M');
  const qtyArchivees={};
  // Compter uniquement les OF archivés MANUELLEMENT via l'appli
  // (pas les archives historiques importées depuis KPI/CRTenons)
  // Un OF archivé manuellement n'a pas de flag valide_controle=true
  // OU a une date d'archivage >= objectifs3m_start
  const startDate = objectifs3m.__start__ || null;
  archives.filter(a=>{
    if(detectClientFull(a.produit)!=='3M') return false;
    // Compter uniquement les OF archivés manuellement depuis l'appli
    if(!a.archivedManually) return false;
    return true;
  }).forEach(a=>{
    const ref=trouverRef3M(a.produit);
    if(ref)qtyArchivees[ref]=(qtyArchivees[ref]||0)+(a.qty_conf||a.qty_ctrl||a.qty||0);
  });
  return{refs3m,obj:objectifs3m,ofsEnCours,qtyArchivees};
}

function render3M(){
  const el=document.getElementById('view-3m');

  const totalFait=refs3m.reduce((s,r)=>s+(qtyArchivees[r]||0),0);
  const pctG=totalObj>0?Math.min(100,Math.round(totalFait/totalObj*100)):0;
  const gC=pctG>=100?'#27500A':pctG>=70?'#185FA5':pctG>=40?'#633806':'#A32D2D';
  const cards=refs3m.map(ref=>{
    const objectif=obj[ref]||0;const fait=qtyArchivees[ref]||0;

    const pct=objectif>0?Math.min(100,Math.round(fait/objectif*100)):0;
    const pctT=objectif>0?Math.min(100,Math.round((fait+enCours)/objectif*100)):0;
    const done=fait>=objectif&&objectif>0;
    const fc=done?'#4A8C1A':pct>=70?'#185FA5':pct>=40?'#D4880A':'#C0547A';
    const cat=catalogue.find(c=>c.ref===ref);

    return `<div class="ref-card${done?' complete':''}">

      </div>

      ${enCours>0?`<div class="prog-bar" style="height:4px;opacity:.4"><div class="prog-fill" style="width:${pctT}%;background:${fc}"></div></div><div style="font-size:10px;color:var(--text-faint)">${enCours.toLocaleString('fr')} en cours</div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px">
        <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:600">${fait.toLocaleString('fr')}</div><div style="font-size:10px;color:var(--text-muted)">Produit</div></div>
        <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:600">${objectif.toLocaleString('fr')}</div><div style="font-size:10px;color:var(--text-muted)">Objectif</div></div>
        <div style="background:var(--bg);border-radius:8px;padding:8px;text-align:center"><div style="font-size:16px;font-weight:600;color:${Math.max(0,objectif-fait)===0?'#27500A':'var(--text)'}">${Math.max(0,objectif-fait).toLocaleString('fr')}</div><div style="font-size:10px;color:var(--text-muted)">Restant</div></div>
      </div>
      ${ofsRef.length?`<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px"><div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;margin-bottom:5px">OF en cours</div>${ofsRef.map(o=>{const s=stageOf(o.stage);return`<div style="display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .1s" onclick="openDetail('${o.id}')" onmouseenter="this.style.background='rgba(0,200,200,.08)'" onmouseleave="this.style.background='transparent'"><span style="font-size:11px;font-weight:600;color:var(--accent)">${o.id}</span><span class="stage-pill" style="background:${s.bg};color:${s.text};font-size:10px;padding:2px 7px">${s.label}</span><span style="font-size:11px;color:var(--text-muted);margin-left:auto">${o.qty.toLocaleString('fr')} u.</span><i class="ti ti-chevron-right" style="font-size:11px;color:var(--text-faint)"></i></div>`;}).join('')}</div>`:''}
      <button class="btn" style="margin-top:4px;font-size:12px;width:100%;justify-content:center" onclick="editObjectif('${ref}')"><i class="ti ti-target"></i> Modifier objectif</button>
    </div>`;
  }).join('');
  el.innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 24px;margin-bottom:16px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px">
        <div><div style="font-size:18px;font-weight:600">Objectif 3M — 2026</div><div style="font-size:13px;color:var(--text-muted);margin-top:2px">${refs3m.length} références</div></div>
        <div style="text-align:right"><div style="font-size:32px;font-weight:700;color:${gC}">${pctG}%</div><div style="font-size:12px;color:var(--text-muted)">${totalFait.toLocaleString('fr')} / ${totalObj.toLocaleString('fr')} pièces</div></div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px">${cards||'<div class="empty"><i class="ti ti-star"></i>Aucune référence 3M</div>'}</div>`;

function showProductForm(p){

  document.getElementById('modal').innerHTML=`
    <div class="modal-header"><h2>${p?'Modifier '+p.ref:'Nouveau produit'}</h2>

    <div class="modal-body">

        <div class="form-group"><label>Client</label>
          <input id="pf-client" value="${p?p.client:''}" list="pf-cl-list">

        </div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group"><label>Matière</label><input id="pf-matiere" value="${p?p.matiere||'':''}"></div>
        <div class="form-group"><label>Machine</label><input id="pf-machine" value="${p?p.machine||'':''}"></div>
      </div>
      <div class="form-row" style="margin-top:12px">
        <div class="form-group"><label>Temps cycle (s/pièce)</label><input id="pf-tc" type="number" min="1" step="0.5" value="${p?p.tc||'':''}"></div>
      </div>

    <div class="modal-footer">

      <button class="btn" onclick="closeOverlay()">Annuler</button>
      <button class="btn btn-primary" onclick="saveProduct('${p?p.ref.replace(/'/g,"\\'"):''}')"><i class="ti ti-check"></i> ${p?'Enregistrer':'Créer'}</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function saveProduct(originalRef){
  const ref=document.getElementById('pf-ref').value.trim();
  const client=document.getElementById('pf-client').value.trim();
  const matiere=document.getElementById('pf-matiere').value.trim();
  const machine=document.getElementById('pf-machine').value.trim();
  const tc=parseFloat(document.getElementById('pf-tc').value)||null;
  if(!ref){alert('La référence est obligatoire.');return;}
  if(originalRef){
    const idx=catalogue.findIndex(c=>c.ref===originalRef);
    if(idx>=0)catalogue[idx]={ref,client,matiere,machine,tc};
    if(originalRef!==ref&&objectifs3m[originalRef]!==undefined){objectifs3m[ref]=objectifs3m[originalRef];delete objectifs3m[originalRef];}
  }else{
    if(catalogue.some(c=>c.ref===ref)){alert("Cette référence existe déjà.");return;}
    catalogue.push({ref,client,matiere,machine,tc});
  }
  if(client==='3M'&&objectifs3m[ref]===undefined)objectifs3m[ref]=0;
  if(client!=='3M'&&originalRef)delete objectifs3m[originalRef];
  closeOverlay();renderCatalogue();scheduleSave();showToast(originalRef?"Produit mis à jour":"Produit créé");
}

function deleteProduct(ref){
  if(!confirm(`Supprimer "${ref}" du catalogue ?`))return;
  catalogue=catalogue.filter(c=>c.ref!==ref);delete objectifs3m[ref];
  closeOverlay();renderCatalogue();scheduleSave();
}

function prefillClient(name,bg,text,dot,prefixes){
  const g=id=>document.getElementById(id);
  if(g('cl-name'))g('cl-name').value=name;
  if(g('cl-prefixes'))g('cl-prefixes').value=prefixes;
  if(g('cl-bg'))g('cl-bg').value=bg;
  if(g('cl-text'))g('cl-text').value=text;
  if(g('cl-dot'))g('cl-dot').value=dot;
  ['cl-bg','cl-text','cl-dot','cl-name'].forEach(id=>g(id)?.dispatchEvent(new Event('input')));
  g('cl-name')?.scrollIntoView({behavior:'smooth',block:'center'});
  g('cl-name')?.focus();
}

function saveClient(){
  const name=document.getElementById('cl-name')?.value.trim().toUpperCase();
  const prefixes=(document.getElementById('cl-prefixes')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const bg=document.getElementById('cl-bg')?.value||'#E6F1FB';
  const text=document.getElementById('cl-text')?.value||'#185FA5';
  const dot=document.getElementById('cl-dot')?.value||'#4C8EDA';
  if(!name){alert('Nom obligatoire.');return;}
  customClients[name]={bg,text,dot,prefixes};
  scheduleSave();showToast(`Client "${name}" enregistré`);
}

function deleteClient(name){
  if(!confirm(`Supprimer le client "${name}" ?`))return;
  delete customClients[name];scheduleSave();
}


function updateTC(ref, value) {
  const tc = parseFloat(value);
  if (isNaN(tc) || tc <= 0) return;
  const entry = catalogue.find(c => c.ref === ref);
  if (entry) { entry.tc = tc; scheduleSave(); }
}

function saveParametres(){
  ['controle','joint','blister','boite'].forEach(id=>{
    const v=parseFloat(document.getElementById('dur-'+id)?.value);
    if(!isNaN(v)){DUREES_ETAPES[id]=v;parametres.durees[id]=v;}
  });
  closeOverlay();render();scheduleSave();showToast('Paramètres enregistrés');
}


// ─── STATISTIQUES ARCHIVES ────────────────────────────────────────────────────
function renderArchiveStats() {
  const av = document.getElementById('archive-view');

  // ── Calculs ──────────────────────────────────────────────────────────────────
  const total = archives.length;
  const totalQty = archives.reduce((s,a)=>s+(a.qty||0),0);

  // Tenons par ML depuis le catalogue
  function getTenonsMl(produit) {
    const e = lookupCatalogueEntry(produit);
    return e?.tenons_ml || null;
  }

  function calcTenons(a) {
    const ml = getTenonsMl(a.produit);
    const qty = a.qty_conf || a.qty_ctrl || a.qty || 0;
    return ml ? Math.round(qty / ml * 10) / 10 : null;
  }

  // Par machine
  const byMachine = {};
  archives.forEach(a => {
    const m = a.machine || 'Non assigné';
    if (!byMachine[m]) byMachine[m] = {ofs:0, qty:0, tenons:0, conf:[], tenonsMl:getTenonsMl(a.produit)};
    byMachine[m].ofs++;
    byMachine[m].qty += (a.qty||0);
    const t = calcTenons(a);
    if (t) byMachine[m].tenons += t;
    if (a.qty_conf!=null && a.qty_ctrl) byMachine[m].conf.push(a.qty_conf/a.qty_ctrl*100);
  });

  // Par client
  const byClient = {};
  archives.forEach(a => {
    const c = detectClientFull(a.produit) || 'Autre';
    if (!byClient[c]) byClient[c] = {ofs:0, qty:0, tenons:0, conf:[], leadTimes:[]};
    byClient[c].ofs++;
    byClient[c].qty += (a.qty||0);
    const t = calcTenons(a);
    if (t) byClient[c].tenons += t;
    if (a.qty_conf!=null && a.qty_ctrl) byClient[c].conf.push(a.qty_conf/a.qty_ctrl*100);
    const lt = leadTime(a.date, a.archivedAt);
    if (lt !== null) byClient[c].leadTimes.push(lt);
  });

  // Par mois
  const byMois = {};
  archives.forEach(a => {
    const m = a.mois || (a.archivedAt ? new Date(a.archivedAt+'T00:00:00').toLocaleDateString('fr-FR',{month:'short',year:'numeric'}) : 'Inconnu');
    if (!byMois[m]) byMois[m] = {ofs:0, qty:0, tenons:0};
    byMois[m].ofs++;
    byMois[m].qty += (a.qty||0);
    const t = calcTenons(a);
    if (t) byMois[m].tenons += t;
  });

  // Top références
  const byRef = {};
  archives.forEach(a => {
    const r = a.produit;
    if (!byRef[r]) byRef[r] = {ofs:0, qty:0};
    byRef[r].ofs++;
    byRef[r].qty += (a.qty||0);
  });
  const topRefs = Object.entries(byRef).sort((a,b)=>b[1].qty-a[1].qty).slice(0,8);

  // Taux délai global
  const avecDelai = archives.filter(a=>a.conforme_delai);
  const tauxDelai = avecDelai.length ? Math.round(avecDelai.filter(a=>a.conforme_delai==='Oui').length/avecDelai.length*100) : null;

  // Total tenons
  let totalTenons = 0;
  archives.forEach(a => { const t=calcTenons(a); if(t) totalTenons+=t; });

  // ── Helpers UI ────────────────────────────────────────────────────────────────
  const avg = arr => arr.length ? Math.round(arr.reduce((s,v)=>s+v,0)/arr.length) : null;
  const pctBar = (val, max, color) =>
    `<div style="height:6px;border-radius:3px;background:var(--border);margin-top:4px;overflow:hidden">
      <div style="height:100%;width:${Math.min(100,val/max*100)}%;background:${color};border-radius:3px;transition:width .4s"></div>
    </div>`;

  const card = (icon, value, label, sub='', color='var(--accent)') =>
    `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;gap:4px">
      <div style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px"><i class="ti ${icon}" style="color:${color};font-size:14px"></i>${label}</div>
      <div style="font-size:24px;font-weight:600;color:var(--text)">${value}</div>
      ${sub?`<div style="font-size:11px;color:var(--text-faint)">${sub}</div>`:''}
    </div>`;

  // ── Rendu ─────────────────────────────────────────────────────────────────────
  const maxMachineQty = Math.max(...Object.values(byMachine).map(m=>m.qty), 1);
  const maxClientQty  = Math.max(...Object.values(byClient).map(c=>c.qty), 1);

  const machineRows = Object.entries(byMachine)
    .sort((a,b)=>b[1].qty-a[1].qty)
    .map(([m,d]) => {
      const tauxConf = d.conf.length ? Math.round(avg(d.conf)) : null;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-radius:6px;padding-left:6px"
        onclick="showMachineDetail('${m}')"
        onmouseenter="this.style.background='var(--accent-light)'"
        onmouseleave="this.style.background=''">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:13px;font-weight:600;flex:1;color:var(--accent-text)">${m}</span>
          <span style="font-size:11px;color:var(--text-muted)">${d.ofs} OF</span>
          <span style="font-size:12px;font-weight:600;color:var(--text)">${d.qty.toLocaleString('fr')} u.</span>
          ${d.tenons?`<span style="font-size:11px;color:var(--text-faint)">${d.tenons.toLocaleString('fr')} m</span>`:''}
          ${tauxConf!==null?`<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:${tauxConf>=99?'#EAF3DE':tauxConf>=95?'#FEF5E7':'#FCEBEB'};color:${tauxConf>=99?'#27500A':tauxConf>=95?'#633806':'#A32D2D'}">${tauxConf}%</span>`:''}
          <i class="ti ti-chevron-right" style="font-size:12px;color:var(--text-faint)"></i>
        </div>
        ${pctBar(d.qty, maxMachineQty, 'var(--accent)')}
      </div>`;
    }).join('');

  const clientRows = Object.entries(byClient)
    .sort((a,b)=>b[1].qty-a[1].qty)
    .map(([c,d]) => {
      const cs = allClients()[c] || DEFAULT_CLIENT;
      const ltMoy = avg(d.leadTimes);
      const tauxConf = d.conf.length ? Math.round(avg(d.conf)) : null;
      return `<div style="padding:10px 6px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-radius:6px"
        onclick="showClientDetail('${c}')"
        onmouseenter="this.style.background='var(--accent-light)'"
        onmouseleave="this.style.background=''">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:${cs.bg};color:${cs.text}">${c}</span>
          <span style="font-size:11px;color:var(--text-muted);flex:1">${d.ofs} OF</span>
          <span style="font-size:12px;font-weight:600;color:var(--text)">${d.qty.toLocaleString('fr')} u.</span>
          ${d.tenons?`<span style="font-size:11px;color:var(--text-faint)">${d.tenons.toLocaleString('fr')} m</span>`:''}
          ${ltMoy!==null?`<span style="font-size:11px;color:var(--text-faint)">${leadTimeFmt(ltMoy)} moy.</span>`:''}
          ${tauxConf!==null?`<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:${tauxConf>=99?'#EAF3DE':tauxConf>=95?'#FEF5E7':'#FCEBEB'};color:${tauxConf>=99?'#27500A':tauxConf>=95?'#633806':'#A32D2D'}">${tauxConf}%</span>`:''}
          <i class="ti ti-chevron-right" style="font-size:12px;color:var(--text-faint)"></i>
        </div>
        ${pctBar(d.qty, maxClientQty, cs.dot)}
      </div>`;
    }).join('');

  const topRefsRows = topRefs.map(([ref, d]) => {
    const cs = clientStyle(ref);
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:12px;font-weight:500;flex:1;font-family:monospace">${ref}</span>

function showMachineDetail(machine) {
  const ofsOnMachine = archives.filter(a => a.machine === machine);
  if (!ofsOnMachine.length) {
    showToast("Aucun OF archivé sur " + machine);
    return;
  }

  function getTenonsMl(produit) {
    const e = lookupCatalogueEntry(produit);
    return e?.tenons_ml || null;
  }
  function calcTenons(a) {
    const ml = getTenonsMl(a.produit);
    const qty = a.qty_conf || a.qty_ctrl || a.qty || 0;
    return ml ? Math.round(qty / ml * 10) / 10 : null;
  }

  const totalQty = ofsOnMachine.reduce((s,a)=>s+(a.qty||0),0);
  const totalTenons = ofsOnMachine.reduce((s,a)=>{const t=calcTenons(a);return t?s+t:s;},0);
  const confs = ofsOnMachine.filter(a=>a.qty_conf!=null&&a.qty_ctrl).map(a=>a.qty_conf/a.qty_ctrl*100);
  const tauxConf = confs.length ? Math.round(confs.reduce((s,v)=>s+v,0)/confs.length) : null;

  const rows = ofsOnMachine
    .sort((a,b)=>(b.archivedAt||'').localeCompare(a.archivedAt||''))
    .map(a => {
      const cs = clientStyle(a.produit);
      const client = detectClientFull(a.produit, a)||'—';
      const pct = a.qty_conf!=null&&a.qty_ctrl ? Math.round(a.qty_conf/a.qty_ctrl*100) : null;
      const qBg = pct===null?'var(--bg)':pct>=99?'#EAF3DE':pct>=95?'#FEF5E7':'#FCEBEB';
      const qC  = pct===null?'var(--text-faint)':pct>=99?'#27500A':pct>=95?'#633806':'#A32D2D';
      const lt  = leadTime(a.date, a.archivedAt);
      const t   = calcTenons(a);
      return `<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s"
        onclick="openArchiveDetail('${a.id}')"
        onmouseenter="this.style.background='var(--accent-light)'"
        onmouseleave="this.style.background=''">
        <span style="font-size:11px;font-weight:600;color:var(--accent);width:80px;flex-shrink:0">${a.id}</span>
        <span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:${cs.bg};color:${cs.text};flex-shrink:0">${client}</span>
        <span style="font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.produit}</span>
        <span style="font-size:11px;color:var(--text-muted);flex-shrink:0">${(a.qty||0).toLocaleString('fr')} u.</span>
        ${t?`<span style="font-size:11px;color:var(--text-faint);flex-shrink:0">${t.toLocaleString('fr')} m</span>`:''}
        ${pct!==null?`<span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;background:${qBg};color:${qC};flex-shrink:0">${pct}%</span>`:''}
        ${lt!==null?`<span style="font-size:11px;color:var(--text-faint);flex-shrink:0">${leadTimeFmt(lt)}</span>`:''}
        <i class="ti ti-chevron-right" style="font-size:11px;color:var(--text-faint);flex-shrink:0"></i>
      </div>`;
    }).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2><i class="ti ti-tool" style="color:var(--accent);margin-right:8px"></i>${machine}
        <span style="font-size:12px;font-weight:400;color:var(--text-muted);margin-left:8px">${ofsOnMachine.length} OF archivés</span>
      </h2>
      <button class="close-btn" onclick="closeOverlay()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" style="padding:0">
      <!-- KPIs -->
      <div style="display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border)">
        <div style="flex:1;padding:12px 16px;background:var(--surface);text-align:center">
          <div style="font-size:18px;font-weight:600">${totalQty.toLocaleString('fr')}</div>
          <div style="font-size:10px;color:var(--text-muted)">Pièces produites</div>
        </div>
        ${totalTenons>0?`<div style="flex:1;padding:12px 16px;background:var(--surface);text-align:center">
          <div style="font-size:18px;font-weight:600;color:var(--accent-text)">${totalTenons.toLocaleString('fr')} m</div>
          <div style="font-size:10px;color:var(--text-muted)">Mètres de joncs</div>
        </div>`:''}
        ${tauxConf!==null?`<div style="flex:1;padding:12px 16px;background:var(--surface);text-align:center">
          <div style="font-size:18px;font-weight:600;color:${tauxConf>=99?'#27500A':tauxConf>=95?'#633806':'#A32D2D'}">${tauxConf}%</div>
          <div style="font-size:10px;color:var(--text-muted)">Qualité moy.</div>

    <div class="modal-footer">
      <button class="btn" onclick="closeOverlay()">Fermer</button>

  document.getElementById('overlay').classList.add('open');

function saveArchiveEdit(id) {
  const a = archives.find(x => x.id === id); if (!a) return;

  a.produit        = document.getElementById('ea-produit')?.value.trim() || a.produit;
  a.designation_kpi= document.getElementById('ea-designation')?.value.trim() || a.designation_kpi;
  // Si un client est sélectionné manuellement, le stocker
  const selectedClient = document.getElementById('ea-client')?.value;
  if (selectedClient) a._clientOverride = selectedClient;
  else delete a._clientOverride;
  a.machine        = document.getElementById('ea-machine')?.value.trim() || '';
  a.mois           = document.getElementById('ea-mois')?.value.trim() || a.mois;
  a.date           = document.getElementById('ea-date')?.value || a.date;
  a.archivedAt     = document.getElementById('ea-archived')?.value || a.archivedAt;
  a.note           = document.getElementById('ea-note')?.value.trim() || '';

  const qty     = parseInt(document.getElementById('ea-qty')?.value);
  const qtyCtrl = parseInt(document.getElementById('ea-qty-ctrl')?.value);
  const qtyConf = parseInt(document.getElementById('ea-qty-conf')?.value);
  const delai   = document.getElementById('ea-delai')?.value;

  if (!isNaN(qty))     a.qty      = qty;
  if (!isNaN(qtyCtrl)) { a.qty_ctrl = qtyCtrl; a.valide_controle = true; }
  if (!isNaN(qtyConf)) a.qty_conf  = qtyConf;
  if (delai !== undefined) a.conforme_delai = delai || null;

  // Recalculer l'écart si on a les dates
  if (a.archivedAt && a.date_fin_theo) {
    const diff = Math.round((new Date(a.archivedAt) - new Date(a.date_fin_theo)) / 86400000);
    a.ecart_j = diff;
  }

  scheduleSave();
  showToast('Archive mise à jour');
  openArchiveDetail(id);
}

function exportData(dateStr) {
  const payload = {
    ofs,
    archives,
    nextId,
    catalogue,
    objectifs_3m: objectifs3m,
    machines,
    durees_etapes: DUREES_ETAPES,
    exported_at: new Date().toISOString(),
    version: '1.0'
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'planprod-sauvegarde-' + dateStr + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Sauvegarde téléchargée ✓');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.ofs || !d.archives) throw new Error('Format invalide');
      if (!confirm(`Restaurer ${d.ofs.length} OF et ${d.archives.length} archives depuis "${file.name}" ?\nCela remplacera toutes les données actuelles.`)) return;
      ofs        = d.ofs        || [];
      archives   = d.archives   || [];
      nextId     = d.nextId     || 1;
      catalogue  = d.catalogue  || catalogue;
      objectifs3m= d.objectifs_3m || {};
      machines   = d.machines   || machines;
      if (d.durees_etapes) Object.assign(DUREES_ETAPES, d.durees_etapes);
      closeOverlay();
      render();
      scheduleSave();
      showToast('Données restaurées avec succès ✓');
    } catch(err) {
      alert('Fichier invalide : ' + err.message);
    }
  };
  reader.readAsText(file);
}

function lookupCatalogueEntry(ref) {
  if (!ref) return null;
  const rL = ref.trim().toLowerCase().replace(/\s+/g,' ');
  // 1. Correspondance exacte (priorité absolue)
  const exact = catalogue.find(c => c.ref.toLowerCase().replace(/\s+/g,' ') === rL);
  if (exact) return exact;
  // 2. La ref du catalogue EST contenue dans la ref saisie (ex: "K05 L27" contient "K05 L27")
  //    Trier par longueur décroissante pour favoriser la ref la plus spécifique
  const sorted = [...catalogue].sort((a,b) => b.ref.length - a.ref.length);
  const contained = sorted.find(c => {
    const cr = c.ref.toLowerCase().replace(/\s+/g,' ');
    return rL === cr || rL.startsWith(cr+' ') || rL.startsWith(cr+'_');
  });
  if (contained) return contained;
  // 3. La ref saisie est contenue dans la ref du catalogue
  const reverse = sorted.find(c => {
    const cr = c.ref.toLowerCase().replace(/\s+/g,' ');
    return cr.startsWith(rL+' ') || cr.startsWith(rL+'_') || cr === rL;
  });
  return reverse || null;
}

function updateTcHint(){
  const ref  = document.getElementById('f-produit')?.value||'';
  const qty  = parseInt(document.getElementById('f-qty')?.value)||0;
  const date = document.getElementById('f-date')?.value||'';
  const hint = document.getElementById('tc-hint'); if(!hint) return;

  if(!ref){ hint.textContent=''; return; }

  const entry = lookupCatalogueEntry(ref);
  if(!entry){
    hint.innerHTML='<i class="ti ti-alert-circle"></i> Référence non trouvée dans le catalogue';
    hint.style.color='var(--text-faint)'; return;
  }

  const tc     = entry.tc;
  const tcTrs  = entry.tc_trs;
  const tenons = entry.tenons_ml;
  const longueur = entry.longueur;

  // Calcul durée usinage
  const h   = qty>0 && tc ? (qty*tc)/3600 : null;
  const fin = h && date ? addJoursOuvres(date,h) : null;

  // Calcul mètres de joncs
  const metres = qty>0 && tenons ? Math.ceil(qty/tenons*10)/10 : null;

  // Construire l'affichage
  const parts = [];
  if(tc)    parts.push(`<span><i class="ti ti-clock" style="font-size:11px"></i> ${tc}s/u</span>`);
  if(tcTrs) parts.push(`<span style="color:var(--text-muted)">(TRS: ${tcTrs}s)</span>`);
  if(h)     parts.push(`<span><i class="ti ti-hourglass" style="font-size:11px"></i> ${dureeFmt(h)}</span>`);
  if(fin)   parts.push(`<span><i class="ti ti-calendar-due" style="font-size:11px"></i> fin le ${fmtDate(fin)}</span>`);

  hint.style.color = 'var(--accent)';
  hint.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">${parts.join('')}</div>`;

  // Bloc info complet sous le champ
  const infoDiv = document.getElementById('metres-hint');
  if(!infoDiv) return;

  const rows = [];

  // Ligne matière
  if(entry.matiere) rows.push(`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border)">
      <i class="ti ti-cylinder" style="color:var(--text-faint);font-size:14px"></i>
      <span style="font-size:12px;color:var(--text-muted)">Matière</span>
      <span style="font-size:13px;font-weight:600;margin-left:auto">${entry.matiere}</span>
    </div>`);

  // Ligne mètres de joncs
  if(metres && tenons) rows.push(`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--border)">
      <i class="ti ti-ruler-2" style="color:var(--accent);font-size:14px"></i>
      <span style="font-size:12px;color:var(--text-muted)">Joncs nécessaires</span>
      <span style="font-size:13px;font-weight:600;color:var(--accent);margin-left:auto">${metres.toLocaleString('fr')} m</span>
      <span style="font-size:11px;color:var(--text-faint)">(${tenons.toFixed(1)}/ML · ${longueur||'?'}mm)</span>
    </div>`);

  // Ligne longueur tenon
  if(longueur) rows.push(`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg)">
      <i class="ti ti-arrows-horizontal" style="color:var(--text-faint);font-size:14px"></i>
      <span style="font-size:12px;color:var(--text-muted)">Longueur tenon</span>
      <span style="font-size:13px;font-weight:600;margin-left:auto">${longueur} mm</span>
    </div>`);

  if(rows.length){
    infoDiv.innerHTML = rows.join('');
    infoDiv.style.display = 'block';
  } else {
    infoDiv.style.display = 'none';
  }
}

function acInput(){
  acIndex=-1;
  const q=(document.getElementById('f-produit')?.value||'').trim().toLowerCase();
  const dd=document.getElementById('ac-dropdown');if(!dd)return;
  if(!q){dd.classList.remove('open');updateTcHint();return;}
  const refs=catalogue.map(c=>c.ref);
  const results=refs.filter(r=>r.toLowerCase().includes(q))
    .sort((a,b)=>{const aS=a.toLowerCase().startsWith(q),bS=b.toLowerCase().startsWith(q);if(aS&&!bS)return-1;if(!aS&&bS)return 1;return a.localeCompare(b);})
    .slice(0,20);
  if(!results.length){dd.innerHTML='<div class="ac-empty">Aucune référence</div>';dd.classList.add('open');return;}
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  dd.innerHTML=results.map((r,i)=>{
    const hl=r.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>');
    const cs=clientStyle(r);const client=detectClientFull(r);
    const tc=catalogue.find(c=>c.ref===r)?.tc;
    return `<div class="ac-item" data-ref="${r}" data-idx="${i}">
      <span class="ac-ref">${hl}</span>
      ${client?`<span class="ac-client" style="background:${cs.bg};color:${cs.text}">${client}</span>`:''}
      <span class="ac-tc">${tc?tc+'s':'?'}</span>
    </div>`;
  }).join('');
  dd.querySelectorAll('.ac-item').forEach(el=>{
    el.addEventListener('mousedown',e=>{e.preventDefault();acMousedown=true;});

// ─── GANTT MOVE (déplacement horizontal) ─────────────────────────────────────
let ganttMoveState = null;

function ganttMoveStart(e, ofId) {
  if (e.target.classList.contains('gantt-resize-handle')) return;
  e.preventDefault(); e.stopPropagation();
  ganttDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const o = ofs.find(x => x.id === ofId); if (!o) return;
  ganttMoveState = {ofId, startX: clientX, originalDate: o.date, lastDelta: 0};

  // Feedback visuel
  const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
  bars.forEach(b => { b.style.opacity = '.7'; b.style.cursor = 'grabbing'; });

  const onMove = ev => {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    ganttMoveMove(cx);
  };
  const onUp = () => {
    ganttMoveEnd();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    setTimeout(() => { ganttDragging = false; }, 100);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive: false});
  document.addEventListener('touchend', onUp);
}

function ganttMoveMove(clientX) {
  if (!ganttMoveState) return;
  const {ofId, startX, originalDate} = ganttMoveState;
  const colW = ganttZoom === 'day' ? 36 : 90;
  const dx = clientX - startX;
  const daysDelta = Math.round(dx / colW * (ganttZoom === 'day' ? 1 : 7));

  if (daysDelta === ganttMoveState.lastDelta) return;
  ganttMoveState.lastDelta = daysDelta;

  const o = ofs.find(x => x.id === ofId); if (!o) return;
  const newDate = addDays(originalDate, daysDelta);
  if (!newDate) return;

  // Mise à jour visuelle de la barre sans re-render
  const {dates: newDates} = calcDates({...o, date: newDate});
  const cols = ganttGetCols();
  const labelW = 130;
  const s = dateToPx(new Date(newDate+'T00:00:00'), cols, colW, labelW, ganttZoom);
  const e2 = dateToPx(new Date((newDates.usinage||newDate)+'T00:00:00'), cols, colW, labelW, ganttZoom);

  const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
  bars.forEach(b => {
    b.style.left = (s - labelW) + 'px';
    b.style.width = Math.max(20, e2 - s) + 'px';
  });

  // Indicateur de date en tooltip
  bars.forEach(b => { b.title = `${ofId} — déplacer vers ${newDate}`; });
}

function ganttMoveEnd() {
  if (!ganttMoveState) return;
  const {ofId, startX, originalDate} = ganttMoveState;
  const colW = ganttZoom === 'day' ? 36 : 90;
  const daysDelta = ganttMoveState.lastDelta;
  const o = ofs.find(x => x.id === ofId);

  if (o && daysDelta !== 0) {
    const newDate = addDays(originalDate, daysDelta);
    if (newDate) {
      o.date = newDate;
      scheduleSave();
      renderGantt();
      render(); // met à jour le kanban
      showToast(`${ofId} déplacé au ${fmtDate(newDate)}`);
    }
  } else {
    // Annuler visuellement si pas de déplacement
    const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
    bars.forEach(b => { b.style.opacity = '1'; b.style.cursor = 'grab'; b.title = `${ofId} — ${o?.produit||''}`; });
  }
  ganttMoveState = null;
}

// ─── GANTT RESIZE ─────────────────────────────────────────────────────────────
let ganttDragging = false;
let ganttResizeState = null;

function ganttResizeStart(e, ofId, side) {
  e.preventDefault(); e.stopPropagation();
  ganttDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  ganttResizeState = {ofId, side, startX: clientX};

  const onMove = (ev) => {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    ganttResizeMove(cx);
  };
  const onUp = () => {
    ganttResizeEnd();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    setTimeout(() => { ganttDragging = false; }, 100);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}

function ganttResizeMove(clientX) {
  if (!ganttResizeState) return;
  const {ofId, side, startX} = ganttResizeState;
  const o = ofs.find(x => x.id === ofId); if (!o) return;
  const colW = ganttZoom === 'day' ? 36 : 90;
  const dx = clientX - startX;
  const daysDelta = Math.round(dx / colW * (ganttZoom === 'day' ? 1 : 7));
  if (daysDelta === (ganttResizeState.lastDelta||0)) return;
  ganttResizeState.lastDelta = daysDelta;

  if (side === 'right') {
    // Étirer à droite = changer la quantité pour correspondre à plus de jours
    const {dates} = calcDates(o);
    const baseEnd = dates.usinage || o.date;
    const newEnd = addDays(baseEnd, daysDelta);
    // Recalculer la quantité depuis la nouvelle durée
    const tc = lookupTC(o.produit);
    if (tc && newEnd > o.date) {
      const startD = new Date(o.date+'T00:00:00');
      const endD   = new Date(newEnd+'T00:00:00');
      const heures = ((endD-startD)/3600000) * (HEURES_PAR_JOUR/24);
      const newQty = Math.round(heures * 3600 / tc);
      if (newQty > 0) {
        o._previewQty = newQty;
        // Mise à jour visuelle de la barre
        updateGanttBarPreview(ofId, o.date, newEnd);
      }
    }
  } else {
    // Étirer à gauche = décaler la date de début
    const newStart = addDays(o.date, daysDelta);
    if (newStart < o.date || newStart >= (calcDates(o).dates.usinage || o.date)) {
      o._previewStart = newStart;
      const {dates} = calcDates(o);
      updateGanttBarPreview(ofId, newStart, dates.usinage || o.date);
    }
  }
}

function ganttResizeEnd() {
  if (!ganttResizeState) return;
  const {ofId} = ganttResizeState;
  const o = ofs.find(x => x.id === ofId);
  if (o) {
    if (o._previewQty) { o.qty = o._previewQty; delete o._previewQty; }
    if (o._previewStart) { o.date = o._previewStart; delete o._previewStart; }
    scheduleSave();
    renderGantt();
    render(); // met aussi à jour le kanban
  }
  ganttResizeState = null;
}

function updateGanttBarPreview(ofId, startStr, endStr) {
  // Mise à jour visuelle sans re-render complet
  const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
  bars.forEach(bar => {
    const cols = ganttGetCols();
    const colW = ganttZoom==='day'?36:90;
    const labelW = 130;
    const s = dateToPx(new Date(startStr+'T00:00:00'), cols, colW, labelW, ganttZoom);
    const e2 = dateToPx(new Date(endStr+'T00:00:00'), cols, colW, labelW, ganttZoom);
    bar.style.left  = (s-labelW)+'px';
    bar.style.width = Math.max(20, e2-s)+'px';
  });
}

function addDays(dateStr, days) {
  if (!dateStr) return dateStr;
  const d = new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

}
