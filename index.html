// ─── GANTT MOVE (déplacement horizontal) ─────────────────────────────────────
let ganttMoveState = null;

function ganttMoveStart(e, ofId) {
  if (e.target.classList.contains('gantt-resize-handle')) return;
  e.preventDefault(); e.stopPropagation();
  ganttDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const o = ofs.find(x => x.id === ofId); if (!o) return;
  ganttMoveState = {ofId, startX: clientX, originalDate: o.date, lastDelta: 0};

  // Feedback visuel
  const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
  bars.forEach(b => { b.style.opacity = '.7'; b.style.cursor = 'grabbing'; });

  const onMove = ev => {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    ganttMoveMove(cx);
  };
  const onUp = () => {
    ganttMoveEnd();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    setTimeout(() => { ganttDragging = false; }, 100);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive: false});
  document.addEventListener('touchend', onUp);
}

function ganttMoveMove(clientX) {
  if (!ganttMoveState) return;
  const {ofId, startX, originalDate} = ganttMoveState;
  const colW = ganttZoom === 'day' ? 36 : 90;
  const dx = clientX - startX;
  const daysDelta = Math.round(dx / colW * (ganttZoom === 'day' ? 1 : 7));

  if (daysDelta === ganttMoveState.lastDelta) return;
  ganttMoveState.lastDelta = daysDelta;

  const o = ofs.find(x => x.id === ofId); if (!o) return;
  const newDate = addDays(originalDate, daysDelta);
  if (!newDate) return;

  // Mise à jour visuelle de la barre sans re-render
  const {dates: newDates} = calcDates({...o, date: newDate});
  const cols = ganttGetCols();
  const labelW = 130;
  const s = dateToPx(new Date(newDate+'T00:00:00'), cols, colW, labelW, ganttZoom);
  const e2 = dateToPx(new Date((newDates.usinage||newDate)+'T00:00:00'), cols, colW, labelW, ganttZoom);

  const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
  bars.forEach(b => {
    b.style.left = (s - labelW) + 'px';
    b.style.width = Math.max(20, e2 - s) + 'px';
  });

  // Indicateur de date en tooltip
  bars.forEach(b => { b.title = `${ofId} — déplacer vers ${newDate}`; });
}

function ganttMoveEnd() {
  if (!ganttMoveState) return;
  const {ofId, startX, originalDate} = ganttMoveState;
  const colW = ganttZoom === 'day' ? 36 : 90;
  const daysDelta = ganttMoveState.lastDelta;
  const o = ofs.find(x => x.id === ofId);

  if (o && daysDelta !== 0) {
    const newDate = addDays(originalDate, daysDelta);
    if (newDate) {
      o.date = newDate;
      scheduleSave();
      renderGantt();
      render(); // met à jour le kanban
      showToast(`${ofId} déplacé au ${fmtDate(newDate)}`);
    }
  } else {
    // Annuler visuellement si pas de déplacement
    const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
    bars.forEach(b => { b.style.opacity = '1'; b.style.cursor = 'grab'; b.title = `${ofId} — ${o?.produit||''}`; });
  }
  ganttMoveState = null;
}

// ─── GANTT RESIZE ─────────────────────────────────────────────────────────────
let ganttDragging = false;
let ganttResizeState = null;

function ganttResizeStart(e, ofId, side) {
  e.preventDefault(); e.stopPropagation();
  ganttDragging = true;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  ganttResizeState = {ofId, side, startX: clientX};

  const onMove = (ev) => {
    const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
    ganttResizeMove(cx);
  };
  const onUp = () => {
    ganttResizeEnd();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
    setTimeout(() => { ganttDragging = false; }, 100);
  };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}

function ganttResizeMove(clientX) {
  if (!ganttResizeState) return;
  const {ofId, side, startX} = ganttResizeState;
  const o = ofs.find(x => x.id === ofId); if (!o) return;
  const colW = ganttZoom === 'day' ? 36 : 90;
  const dx = clientX - startX;
  const daysDelta = Math.round(dx / colW * (ganttZoom === 'day' ? 1 : 7));
  if (daysDelta === (ganttResizeState.lastDelta||0)) return;
  ganttResizeState.lastDelta = daysDelta;

  if (side === 'right') {
    // Étirer à droite = changer la quantité pour correspondre à plus de jours
    const {dates} = calcDates(o);
    const baseEnd = dates.usinage || o.date;
    const newEnd = addDays(baseEnd, daysDelta);
    // Recalculer la quantité depuis la nouvelle durée
    const tc = lookupTC(o.produit);
    if (tc && newEnd > o.date) {
      const startD = new Date(o.date+'T00:00:00');
      const endD   = new Date(newEnd+'T00:00:00');
      const heures = ((endD-startD)/3600000) * (HEURES_PAR_JOUR/24);
      const newQty = Math.round(heures * 3600 / tc);
      if (newQty > 0) {
        o._previewQty = newQty;
        // Mise à jour visuelle de la barre
        updateGanttBarPreview(ofId, o.date, newEnd);
      }
    }
  } else {
    // Étirer à gauche = décaler la date de début
    const newStart = addDays(o.date, daysDelta);
    if (newStart < o.date || newStart >= (calcDates(o).dates.usinage || o.date)) {
      o._previewStart = newStart;
      const {dates} = calcDates(o);
      updateGanttBarPreview(ofId, newStart, dates.usinage || o.date);
    }
  }
}

function ganttResizeEnd() {
  if (!ganttResizeState) return;
  const {ofId} = ganttResizeState;
  const o = ofs.find(x => x.id === ofId);
  if (o) {
    if (o._previewQty) { o.qty = o._previewQty; delete o._previewQty; }
    if (o._previewStart) { o.date = o._previewStart; delete o._previewStart; }
    scheduleSave();
    renderGantt();
    render(); // met aussi à jour le kanban
  }
  ganttResizeState = null;
}

function updateGanttBarPreview(ofId, startStr, endStr) {
  // Mise à jour visuelle sans re-render complet
  const bars = document.querySelectorAll(`.gantt-bar[data-id="${ofId}"]`);
  bars.forEach(bar => {
    const cols = ganttGetCols();
    const colW = ganttZoom==='day'?36:90;
    const labelW = 130;
    const s = dateToPx(new Date(startStr+'T00:00:00'), cols, colW, labelW, ganttZoom);
    const e2 = dateToPx(new Date(endStr+'T00:00:00'), cols, colW, labelW, ganttZoom);
    bar.style.left  = (s-labelW)+'px';
    bar.style.width = Math.max(20, e2-s)+'px';
  });
}

function addDays(dateStr, days) {
  if (!dateStr) return dateStr;
  const d = new Date(dateStr+'T12:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}

let _ganttCols = [];
function ganttGetCols() { return _ganttCols; }


// ─── SWIPE MOBILE ──────────────────────────────────────────────────────────
let swipeStartX = 0, swipeStartY = 0;

function initSwipe() {
  const kv = document.getElementById('kanban-view');
  if (!kv) return;
  kv.addEventListener('touchstart', e => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, {passive: true});
  kv.addEventListener('touchend', e => {
    if (!isMobile()) return;
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      // Swipe horizontal détecté
      if (dx < 0) mobileStageNav(1);  // swipe gauche → étape suivante
      else mobileStageNav(-1);         // swipe droite → étape précédente
    }
  }, {passive: true});
}


// ─── MODIFICATION DES DATES ───────────────────────────────────────────────────
function editDates(id) {
  const o = ofs.find(x => x.id === id); if (!o) return;
  const {dates} = calcDates(o);
  const curIdx = STAGES.findIndex(s => s.id === o.stage);

  // Pour chaque étape : date d'entrée (stageEnteredAt) + date de fin (= entrée étape suivante ou override)
  const rows = STAGES.map((s, i) => {
    const isActive = i === curIdx;
    const isDone   = i < curIdx;
    const isFuture = i > curIdx;

    // Date d'entrée dans cette étape
    const enteredVal = o.stageEnteredAt?.[s.id] || '';
    // Date de fin de cette étape = date d'entrée de l'étape suivante
    const nextStage = STAGES[i+1];
    const finVal = nextStage ? (o.stageEnteredAt?.[nextStage.id] || '') : '';

    const rowBg = isActive ? 'var(--accent-light)' : 'var(--surface)';
    const labelColor = isDone ? 'var(--text-muted)' : isActive ? 'var(--accent-text)' : 'var(--text-faint)';

    return `<div style="background:${rowBg};border:1px solid ${isActive?'var(--accent)':'var(--border)'};border-radius:var(--radius);padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${isDone||isActive?'10px':'0'}">
        <span style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
        <span style="font-size:13px;font-weight:${isActive?'600':'500'};color:${labelColor};flex:1">${s.label}</span>
        ${isActive?'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent);color:#fff">EN COURS</span>':''}
        ${isDone?'<span style="font-size:10px;color:var(--text-faint)">✓ Terminé</span>':''}
        ${isFuture?'<span style="font-size:10px;color:var(--text-faint)">À venir</span>':''}
      </div>
      ${isDone||isActive ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">
            <i class="ti ti-calendar-plus" style="vertical-align:-2px;margin-right:4px"></i>Entrée en ${s.label}
          </div>
          <input type="date" id="date-enter-${s.id}" value="${enteredVal}"
            style="width:100%;padding:7px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none"
            oninput="syncNextEntry('${s.id}',this.value)">
        </div>
        ${nextStage && (isDone) ? `<div>
          <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">
            <i class="ti ti-calendar-check" style="vertical-align:-2px;margin-right:4px"></i>Sortie de ${s.label}
          </div>
          <input type="date" id="date-exit-${s.id}" value="${finVal}"
            style="width:100%;padding:7px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none"
            oninput="syncNextEntry2('${nextStage.id}',this.value)">
          <div style="font-size:10px;color:var(--text-faint);margin-top:3px">= Entrée en ${nextStage.label}</div>
        </div>` : '<div></div>'}
      </div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2><i class="ti ti-calendar-event" style="color:var(--accent);margin-right:8px"></i>Chronologie — ${o.id}</h2>
      <button class="close-btn" onclick="closeOverlay()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text-faint);margin-bottom:12px;padding:8px 12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)">
        <i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:6px"></i>
        Modifie les dates d'entrée et de sortie de chaque étape. La date de sortie d'une étape correspond automatiquement à la date d'entrée de l'étape suivante.
      </div>
      ${rows}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="resetDates('${id}')"><i class="ti ti-refresh"></i> Réinitialiser</button>
      <button class="btn" onclick="openDetail('${id}')">Annuler</button>
      <button class="btn btn-primary" onclick="saveDates('${id}')"><i class="ti ti-check"></i> Enregistrer</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

// Synchronise la date d'entrée d'une étape quand on modifie la sortie de la précédente
function syncNextEntry(stageId, val) {
  // Quand on change l'entrée d'une étape, met à jour la sortie de la précédente
  const idx = STAGES.findIndex(s => s.id === stageId);
  if (idx > 0) {
    const prevExit = document.getElementById('date-exit-' + STAGES[idx-1].id);
    if (prevExit && !prevExit.value) prevExit.value = val;
  }
}

function syncNextEntry2(nextStageId, val) {
  // Quand on change la sortie d'une étape, met à jour l'entrée de la suivante
  const nextInp = document.getElementById('date-enter-' + nextStageId);
  if (nextInp) nextInp.value = val;
}

function saveDates(id) {
  const o = ofs.find(x => x.id === id); if (!o) return;
  if (!o.stageEnteredAt) o.stageEnteredAt = {};

  STAGES.forEach(s => {
    const enterInp = document.getElementById('date-enter-' + s.id);
    if (enterInp !== null) {
      if (enterInp.value) o.stageEnteredAt[s.id] = enterInp.value;
      else delete o.stageEnteredAt[s.id];
    }
  });

  // La date de sortie d'une étape = date d'entrée de la suivante
  STAGES.forEach((s, i) => {
    const exitInp = document.getElementById('date-exit-' + s.id);
    if (exitInp && exitInp.value && STAGES[i+1]) {
      o.stageEnteredAt[STAGES[i+1].id] = exitInp.value;
    }
  });

  // Supprimer les anciens overrides (ancien système)
  STAGES.forEach(s => { delete o['dateOverride_' + s.id]; });

  closeOverlay();
  render();
  scheduleSave();
  showToast('Chronologie mise à jour');
}

function resetDates(id) {
  const o = ofs.find(x => x.id === id); if (!o) return;
  STAGES.forEach(s => { delete o['dateOverride_' + s.id]; });
  closeOverlay();
  render();
  scheduleSave();
  showToast('Dates réinitialisées');
}

// ─── PAGE STATISTIQUES ────────────────────────────────────────────────────────
function renderStatsPage() {
  const el = document.getElementById('view-stats');
  if (!el) return;
  const today = new Date(); today.setHours(0,0,0,0);
  const byStage = {};
  STAGES.forEach(s => { byStage[s.id] = []; });
  ofs.forEach(o => { if (byStage[o.stage]) byStage[o.stage].push(o); });
  const totalOfs = ofs.length;
  const enRetard = ofs.filter(o => isBlocked(o)).length;
  const nonAssignes = ofs.filter(o => !o.machine).length;
  const enAttenteAlerte = ofs.filter(o => { const j=joursEnAttente(o); return j!==null&&j>=2; }).length;
  const totalQty = ofs.reduce((s,o)=>s+(o.qty||0),0);
  const leadTimes = ofs.filter(o=>o.date).map(o=>Math.round((today-new Date(o.date+'T00:00:00'))/86400000));
  const avgLead = leadTimes.length ? Math.round(leadTimes.reduce((s,v)=>s+v,0)/leadTimes.length) : null;
  const byMachine = {};
  ofs.forEach(o => { const m=o.machine||'— Non assigné'; if(!byMachine[m])byMachine[m]={ofs:[],qty:0}; byMachine[m].ofs.push(o); byMachine[m].qty+=o.qty||0; });
  const machineEntries = Object.entries(byMachine).sort((a,b)=>b[1].qty-a[1].qty);
  const maxMQty = Math.max(...machineEntries.map(([,d])=>d.qty),1);
  const byClient = {};
  ofs.forEach(o => { const c=detectClientFull(o.produit)||'Autre'; if(!byClient[c])byClient[c]={ofs:0,qty:0}; byClient[c].ofs++; byClient[c].qty+=o.qty||0; });
  const clientEntries = Object.entries(byClient).sort((a,b)=>b[1].qty-a[1].qty);
  const maxCQty = Math.max(...clientEntries.map(([,d])=>d.qty),1);
  const pctBar = (val,max,color) => `<div style="height:5px;border-radius:3px;background:var(--border);margin-top:5px;overflow:hidden"><div style="height:100%;width:${Math.min(100,val/max*100)}%;background:${color};border-radius:3px"></div></div>`;
  const kpi = (icon,val,label,color='var(--accent)',onclick='') => `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;flex-direction:column;gap:4px;cursor:${onclick?'pointer':'default'}" ${onclick?`onclick="${onclick}"`:''}><div style="font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:6px"><i class="ti ${icon}" style="color:${color};font-size:14px"></i>${label}</div><div style="font-size:26px;font-weight:700;color:var(--text)">${val}</div></div>`;
  const stageRows = STAGES.map(s => { const items=byStage[s.id]||[]; const qty=items.reduce((a,o)=>a+(o.qty||0),0); const retard=items.filter(o=>isBlocked(o)).length; const pct=totalOfs?Math.round(items.length/totalOfs*100):0; return `<div style="display:flex;align-items:center;gap:12px;padding:10px 6px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;transition:background .1s" onclick="setSideFilter('stage:${s.id}');setView('kanban')" onmouseenter="this.style.background='var(--accent-light)'" onmouseleave="this.style.background=''"><span class="stage-dot" style="background:${s.color};flex-shrink:0"></span><span style="font-size:13px;font-weight:500;flex:1">${s.label}</span><span style="font-size:12px;color:var(--text-muted)">${items.length} OF</span><span style="font-size:12px;font-weight:600">${qty.toLocaleString('fr')} u.</span>${retard>0?`<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:#FCEBEB;color:#A32D2D">${retard} retard</span>`:'<span style="min-width:60px"></span>'}<span style="font-size:10px;color:var(--text-faint)">${pct}%</span><i class="ti ti-chevron-right" style="font-size:11px;color:var(--text-faint)"></i></div>`; }).join('');

function pdpGetStockForWip(codart) {
  const EMPL_OK  = ['BSRTD1','BFRI01'];
  const EMPL_NOK = ['R&D','KATNC','ECHANT','SARNC','ECH','ZREBUT','NC'];
  return (pcData.stock || [])
    .filter(r => {
      const art  = String(r.CODART||'').trim();
      const empl = String(r.EMPLAC||'').trim();
      return art === codart && EMPL_OK.some(e=>empl===e) && !EMPL_NOK.some(e=>empl===e);
    })
    .reduce((s,r) => s + (Number(r.QTEEMP)||0), 0);
}

function pdpGetEnCoursForWip(codart) {
  return (pcData.ofEnCours || [])
    .filter(r => String(r.CODART||'').trim() === codart)
    .reduce((s,r) => s + (Number(r.QTEPRE)||0), 0);
}

  // Chercher aussi dans les commandes via la correspondance inverse FG
  return (pcData.commandes || [])
    .filter(r => String(r.REF_RTD||'').trim() === codartWip && String(r.LIGNE_CDE_||'').trim() === 'N')
    .reduce((s,r) => s + ((Number(r.QTE_CDE)||0) - (Number(r.QTE_LIVREE)||0)), 0);
}

function renderPdpPage() {
  const el = document.getElementById('view-pdp');
  if (!el) return;

  // Grouper par client
  const byClient = {};
  PDP_CORRESPONDANCES.forEach(c => {
    byClient[c.client] = byClient[c.client] || [];
    byClient[c.client].push(c);
  });
  const clients = Object.keys(byClient).sort();

  const hasData = (pcData.stock||[]).length > 0 || (pcData.ofEnCours||[]).length > 0;

  // Filtrer les refs selon recherche
  const search = pdpSearchFilter.toLowerCase();

  // ── Sélecteur de clients (tabs)
  const CLIENT_OEM = ['BRASSELER','APOL','MAILLEFER','ULTRADENT','VDW VRAC','AXIS','SHOFU','RTD'];
  const FAMILLES = ['Macrolock','Macro Ill XRO','Macro Oval','Matchpost','DT Light','DT Ill XRO','Endo','NTI','DRILL DT'];
  const oemClients = clients.filter(c => CLIENT_OEM.includes(c));
  const familleClients = clients.filter(c => FAMILLES.includes(c));
  const otherClients = clients.filter(c => !CLIENT_OEM.includes(c) && !FAMILLES.includes(c));

  function makeTabs(list) {
    return list.map(cl => {
      const col = PDP_CLIENT_COLORS[cl] || {bg:'var(--bg)',dot:'var(--accent)',text:'var(--accent)'};
      const isSel = pdpSelectedClient === cl;
      const count = byClient[cl] ? byClient[cl].length : 0;
      return '<button onclick="pdpSelectClient('' + cl + '')" style="'

function pdpSelectClient(client) {
  pdpSelectedClient = client;
  pdpSearchFilter = '';
  renderPdpPage();
}

function pdpSearch(val) {
  pdpSearchFilter = val;
  clearTimeout(_pdpSearchTimer);
  _pdpSearchTimer = setTimeout(() => {
    renderPdpPage();
    const inp = document.getElementById('pdp-search');
    if (inp) { inp.focus(); inp.value = val; }
  }, 200);
}

let calcAcIdx = -1;

function calcRefInput() {
  calcAcIdx = -1;
  const q = (document.getElementById('calc-ref')?.value||'').trim().toLowerCase();
  const dd = document.getElementById('calc-dropdown');
  if (!dd) return;
  if (!q) { dd.style.display='none'; calcUpdate(); return; }
  const matches = catalogue
    .filter(c => c.ref.toLowerCase().includes(q))
    .sort((a,b) => {
      const aS = a.ref.toLowerCase().startsWith(q);
      const bS = b.ref.toLowerCase().startsWith(q);
      if (aS && !bS) return -1; if (!aS && bS) return 1;
      return a.ref.localeCompare(b.ref);
    }).slice(0,15);
  if (!matches.length) { dd.style.display='none'; calcUpdate(); return; }
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  dd.innerHTML='';
  matches.forEach((c,i)=>{
    const hl=c.ref.replace(new RegExp('('+esc+')','gi'),'<mark style="background:transparent;color:var(--accent);font-weight:700">$1</mark>');
    const cs=clientStyle(c.ref); const client=detectClientFull(c.ref)||'';
    const item=document.createElement('div');
    item.className='calc-ac-item'; item.dataset.ref=c.ref; item.dataset.idx=i;
    item.style.cssText='padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)';
    item.innerHTML='<span style="flex:1;font-size:13px">'+hl+'</span>'
      +(client?'<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:'+cs.bg+';color:'+cs.text+'">'+client+'</span>':'')
      +(c.tc?'<span style="font-size:11px;color:var(--text-faint)">'+c.tc+'s</span>':'');
    item.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();});
    item.addEventListener('click',()=>{calcSelectRef(c.ref);});
    item.addEventListener('mouseenter',()=>{calcAcIdx=i;calcHighlight();});
    dd.appendChild(item);
  });
  // Positionner le dropdown en fixed sous l'input
  const inp2 = document.getElementById('calc-ref');
  if (inp2) {
    const rect = inp2.getBoundingClientRect();
    dd.style.top  = (rect.bottom + 4) + 'px';
    dd.style.left = rect.left + 'px';
    dd.style.width = rect.width + 'px';
  }
  dd.style.display = 'block';
  calcUpdate();
}

function calcHighlight() {
  document.querySelectorAll('.calc-ac-item').forEach((el,i)=>{
    el.style.background = i===calcAcIdx ? 'var(--accent-light)' : '';
  });
}

function calcKeydown(e) {
  const dd = document.getElementById('calc-dropdown');
  if (!dd || dd.style.display==='none') return;
  const items = dd.querySelectorAll('.calc-ac-item');
  if (e.key==='ArrowDown') { e.preventDefault(); calcAcIdx=Math.min(calcAcIdx+1,items.length-1); calcHighlight(); }
  else if (e.key==='ArrowUp') { e.preventDefault(); calcAcIdx=Math.max(calcAcIdx-1,0); calcHighlight(); }
  else if (e.key==='Enter') { e.preventDefault(); if(calcAcIdx>=0){ const ref=items[calcAcIdx]?.dataset.ref; if(ref) calcSelectRef(ref); } }
  else if (e.key==='Escape') { dd.style.display='none'; }
}

function calcSelectRef(ref) {
  const inp = document.getElementById('calc-ref');
  if (inp) inp.value = ref;
  const dd = document.getElementById('calc-dropdown');
  if (dd) dd.style.display = 'none';
  calcAcIdx = -1;
  calcUpdate();
  document.getElementById('calc-qty')?.focus();
}

let _calcUpdating = false;

function calcFromQty() {
  if (_calcUpdating) return;
  const ref = document.getElementById('calc-ref')?.value?.trim() || '';
  const qty = parseInt(document.getElementById('calc-qty')?.value) || 0;
  const entry = ref ? lookupCatalogueEntry(ref) : null;
  const tenons = entry?.tenons_ml;
  _calcUpdating = true;
  const inp = document.getElementById('calc-metres');
  if (inp) inp.value = (tenons && qty > 0) ? Math.ceil(qty / tenons * 10) / 10 : '';
  _calcUpdating = false;
  calcUpdate();
}

function calcFromMetres() {
  if (_calcUpdating) return;
  const ref = document.getElementById('calc-ref')?.value?.trim() || '';
  const metres = parseFloat(document.getElementById('calc-metres')?.value) || 0;
  const entry = ref ? lookupCatalogueEntry(ref) : null;
  const tenons = entry?.tenons_ml;
  _calcUpdating = true;
  const inp = document.getElementById('calc-qty');
  if (inp) inp.value = (tenons && metres > 0) ? Math.floor(metres * tenons) : '';
  _calcUpdating = false;
  calcUpdate();
}

function calcUpdate() {
  const ref = document.getElementById('calc-ref')?.value?.trim() || '';
  const qty = parseInt(document.getElementById('calc-qty')?.value) || 0;
  const metresVal = parseFloat(document.getElementById('calc-metres')?.value) || 0;
  const result = document.getElementById('calc-result');
  if (!result) return;
  if (!ref) { result.style.display='none'; return; }

  const entry = lookupCatalogueEntry(ref);
  if (!entry) {
    result.style.display='block';
    result.innerHTML = '<div style="padding:12px 14px;color:var(--text-faint);font-size:13px"><i class="ti ti-alert-circle"></i> Référence non trouvée dans le catalogue</div>';
    return;
  }

  const tc        = entry.tc;
  const tcTrs     = entry.tc_trs;
  const tenons    = entry.tenons_ml;
  const matiere   = entry.matiere;
  const machine   = entry.machine;
  const qtyFinal  = qty > 0 ? qty : (tenons && metresVal > 0 ? Math.floor(metresVal * tenons) : 0);
  const metresFinal = tenons && qtyFinal > 0 ? Math.ceil(qtyFinal / tenons * 10) / 10 : null;
  const heures    = qtyFinal > 0 && tc ? (qtyFinal * tc) / 3600 : null;
  const heuresTrs = qtyFinal > 0 && tcTrs ? (qtyFinal * tcTrs) / 3600 : null;

  const row = (icon, label, value, color=null) =>
    `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:${color?'var(--accent-light)':'var(--bg)'}">
      <i class="ti ${icon}" style="color:${color||'var(--text-faint)'};font-size:15px;flex-shrink:0"></i>
      <span style="font-size:12px;color:var(--text-muted);flex:1">${label}</span>
      <span style="font-size:${color?'15':'13'}px;font-weight:${color?700:500};color:${color||'var(--text)'}">${value}</span>
    </div>`;

  result.style.display = 'block';
  result.innerHTML = [
    row('ti-tag', 'Référence', entry.ref),
    matiere ? row('ti-cylinder', 'Matière', matiere) : '',
    machine ? row('ti-tool', 'Machine', machine) : '',
    tc ? row('ti-clock', 'Temps cycle', tc + 's/u' + (tcTrs ? ` (TRS: ${tcTrs}s)` : '')) : '',
    tenons ? row('ti-stack-2', 'Tenons par ML', tenons.toFixed(1) + ' /ML') : row('ti-alert-circle', 'Tenons par ML', 'Non disponible — catalogue à mettre à jour'),
    metresFinal !== null ? row('ti-ruler-2', 'Mètres de joncs', metresFinal.toLocaleString('fr') + ' m', '#1D9E75') : '',
    qtyFinal > 0 && tenons ? row('ti-stack-2', 'Quantité de pièces', qtyFinal.toLocaleString('fr') + ' pièces', '#4C8EDA') : '',
    heures !== null ? row('ti-hourglass', "Durée d'usinage estimée", (()=>{
      const j = Math.ceil(heures / HEURES_PAR_JOUR);
      const h = Math.round(heures * 10) / 10;
      return j + 'j (' + h + 'h)';
    })()) : '',
  ].filter(Boolean).join('');
}


// ─── INIT ─────────────────────────────────────────────────────────────────────
initSwipe();
loadData();

</script>
