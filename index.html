<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlanProd — Ordres de fabrication</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#F7F6F3;--surface:#FFFFFF;--surface2:#F1EFF9;
    --border:rgba(0,0,0,0.08);--border-med:rgba(0,0,0,0.14);
    --text:#1A1A2E;--text-muted:#6B6B8A;--text-faint:#A0A0BC;
    --accent:#4C3FC1;--accent-light:#EAE8FF;--accent-text:#3A2FA8;
    --font:'Inter',system-ui,-apple-system,sans-serif;
    --radius:10px;--radius-lg:14px;--sidebar:224px;
    --c-creation-bg:#E6F1FB;--c-creation-text:#0C447C;--c-creation-border:#B5D4F4;
    --c-attente-bg:#F1EFE8;--c-attente-text:#444441;--c-attente-border:#D3D1C7;
    --c-usinage-bg:#FAEEDA;--c-usinage-text:#633806;--c-usinage-border:#FAC775;
    --c-controle-bg:#EEEDFE;--c-controle-text:#3C3489;--c-controle-border:#AFA9EC;
    --c-joint-bg:#E1F5EE;--c-joint-text:#085041;--c-joint-border:#9FE1CB;
    --c-blister-bg:#FBEAF0;--c-blister-text:#72243E;--c-blister-border:#F4C0D1;
    --c-boite-bg:#EAF3DE;--c-boite-text:#27500A;--c-boite-border:#C0DD97;
    --prio-haute-bg:#FCEBEB;--prio-haute-text:#A32D2D;
    --prio-normale-bg:#E6F1FB;--prio-normale-text:#185FA5;
    --prio-basse-bg:#F1EFE8;--prio-basse-text:#5F5E5A;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0F0E1A;--surface:#1A1928;--surface2:#231F3A;
    --border:rgba(255,255,255,0.08);--border-med:rgba(255,255,255,0.14);
    --text:#E8E6F8;--text-muted:#9B99BE;--text-faint:#5F5D80;
    --accent:#7B6EE8;--accent-light:#2A2550;--accent-text:#A89BF5;
  }}
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ALERT BANNER */
  .alert-banner{display:none;align-items:center;gap:12px;padding:10px 24px;background:#FCEBEB;border-bottom:1px solid #F0BABA;color:#7A1F1F;font-size:13px;flex-shrink:0}
  .alert-banner.show{display:flex}
  .alert-banner i{font-size:18px;color:#A32D2D;flex-shrink:0}
  .alert-banner strong{font-weight:600}
  .alert-banner-list{display:flex;flex-wrap:wrap;gap:6px;margin-left:4px}
  .alert-chip{background:#fff;border:1px solid #F0BABA;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:500;cursor:pointer;color:#A32D2D}
  .alert-chip:hover{background:#FCEBEB}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
  .topbar-logo{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--accent);margin-right:8px}
  .topbar-logo i{font-size:20px}
  .topbar-divider{width:1px;height:24px;background:var(--border)}
  .topbar-search{flex:1;max-width:320px;position:relative}
  .topbar-search i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:16px}
  .topbar-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none}
  .topbar-search input:focus{border-color:var(--accent)}
  .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .topbar-date{font-size:12px;color:var(--text-muted)}
  .save-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);padding:5px 10px;border-radius:var(--radius);border:1px solid transparent;transition:all .3s}
  .save-status.saving{color:#185FA5;border-color:#B5D4F4;background:#E6F1FB}
  .save-status.saved{color:#27500A;border-color:#C0DD97;background:#EAF3DE}
  .save-status.error{color:#A32D2D;border-color:#F4C0D1;background:#FBEAF0}

  /* LAYOUT */
  .layout{display:flex;flex:1;overflow:hidden}
  .sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:4px;flex-shrink:0;overflow-y:auto}
  .sidebar-section{font-size:10px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 4px;margin-top:8px}
  .sidebar-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--text-muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .12s,color .12s}
  .sidebar-item:hover{background:var(--bg);color:var(--text)}
  .sidebar-item.active{background:var(--accent-light);color:var(--accent-text);font-weight:500}
  .sidebar-item i{font-size:17px;flex-shrink:0}
  .sidebar-badge{margin-left:auto;font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--border);color:var(--text-muted)}
  .sidebar-item.active .sidebar-badge{background:var(--accent);color:#fff}
  .sidebar-badge.alert{background:#FCEBEB;color:#A32D2D}
  .stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

  /* MAIN */
  .main{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .toolbar{display:flex;align-items:center;gap:12px;padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
  .toolbar h1{font-size:16px;font-weight:600}
  .toolbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-family:var(--font);font-weight:500;cursor:pointer;border:1px solid var(--border-med);background:var(--surface);color:var(--text);transition:background .1s;white-space:nowrap}
  .btn:hover{background:var(--bg)}
  .btn i{font-size:15px}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn-primary:hover{opacity:.88;background:var(--accent)}
  .btn-danger{color:#A32D2D}
  .btn-danger:hover{background:#FCEBEB;border-color:#F0959580}
  .btn-archive{color:#27500A;border-color:#C0DD97;background:#EAF3DE}
  .btn-archive:hover{background:#D8EDCC}
  .filter-select{padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border-med);background:var(--surface);color:var(--text);font-size:13px;font-family:var(--font);cursor:pointer;outline:none}

  /* STATS */
  .stats-bar{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
  .stat{flex:1;padding:12px 20px;background:var(--surface);display:flex;align-items:center;gap:12px}
  .stat-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .stat-num{font-size:22px;font-weight:600;line-height:1}
  .stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}

  /* CONTENT */
  .content{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .kanban{display:flex;flex:1;overflow-x:auto;overflow-y:hidden}
  .kanban-col{flex:1;min-width:160px;max-width:220px;display:flex;flex-direction:column;border-right:1px solid var(--border)}
  .kanban-col:last-child{border-right:none}
  .kanban-head{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
  .kanban-head-title{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px}
  .kanban-head-count{font-size:11px;color:var(--text-muted);margin-top:2px;padding-left:19px}
  .kanban-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px}

  /* CARD */
  .of-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;cursor:pointer;transition:box-shadow .12s,transform .1s;border-left-width:3px;position:relative}
  .of-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
  .of-card.blocked{border-color:#F0BABA;box-shadow:0 0 0 1px #F0BABA}
  .of-card.dragging{opacity:.35;transform:scale(.96);pointer-events:none}
  .of-card[draggable=true]{cursor:grab}
  .kanban-col.drag-over .kanban-body{background:var(--accent-light);outline:2px dashed var(--accent);outline-offset:-2px;border-radius:8px}
  .of-ref{font-size:11px;font-weight:600;color:var(--text-muted)}
  .of-produit{font-size:13px;font-weight:500;color:var(--text);margin:3px 0 4px;line-height:1.3}
  .of-client-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-bottom:5px}
  .of-meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .of-qty{font-size:11px;color:var(--text-muted)}
  .prio-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
  .of-deadline{font-size:10px;margin-top:5px;display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:6px;width:fit-content}
  .of-deadline.late{background:#FCEBEB;color:#A32D2D}
  .of-deadline.soon{background:#FAEEDA;color:#633806}
  .of-deadline.ok{background:#EAF3DE;color:#27500A}
  .of-deadline.unknown{background:var(--bg);color:var(--text-faint)}
  .blocked-badge{position:absolute;top:8px;right:8px;background:#A32D2D;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:20px;display:flex;align-items:center;gap:3px}

  /* LIST */
  .list-view{flex:1;overflow-y:auto;padding:16px 24px;display:none;flex-direction:column;gap:6px}
  .list-header{display:grid;grid-template-columns:110px 80px 1fr 130px 70px 80px 90px 130px 40px;gap:10px;padding:8px 16px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
  .list-row{display:grid;grid-template-columns:110px 80px 1fr 130px 70px 80px 90px 130px 40px;gap:10px;align-items:center;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;transition:background .1s}
  .list-row:hover{border-color:var(--border-med);background:var(--surface2)}
  .list-row.blocked{border-color:#F0BABA}
  .of-ref-tag{font-size:12px;font-weight:600;color:var(--accent)}
  .stage-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px}
  .deadline-badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px}

  /* ARCHIVE VIEW */
  .archive-view{flex:1;overflow-y:auto;padding:16px 24px;display:none;flex-direction:column;gap:6px}
  .archive-header{display:grid;grid-template-columns:110px 80px 1fr 70px 90px 120px 40px;gap:10px;padding:8px 16px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
  .archive-row{display:grid;grid-template-columns:110px 80px 1fr 70px 90px 120px 40px;gap:10px;align-items:center;padding:11px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;opacity:.8}
  .archive-row:hover{opacity:1;border-color:var(--border-med)}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(10,8,30,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border-med);width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
  .modal-header h2{font-size:16px;font-weight:600}
  .modal-body{padding:20px 24px}
  .modal-footer{display:flex;gap:8px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--border)}

  /* PROGRESS */
  .progress-wrap{margin:0 0 16px}
  .progress-steps{display:flex;position:relative;margin:8px 0 0}
  .progress-steps::before{content:'';position:absolute;top:11px;left:12px;right:12px;height:2px;background:var(--border);z-index:0}
  .ps{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;z-index:1}
  .ps-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);background:var(--surface);color:var(--text-faint)}
  .ps-dot.done{background:#1D9E75;border-color:#1D9E75;color:#fff}
  .ps-dot.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .ps-label{font-size:9px;text-align:center;margin-top:5px;color:var(--text-faint);max-width:52px;line-height:1.3}
  .ps-label.active{color:var(--accent);font-weight:600}

  /* STAGE TIMELINE */
  .stage-timeline{margin:8px 0 16px;display:flex;flex-direction:column;gap:5px}
  .st-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:8px;border:1px solid var(--border)}
  .st-row.active-stage{border-color:var(--accent);background:var(--accent-light)}
  .st-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .st-label{font-size:12px;font-weight:500;flex:1}
  .st-duration{font-size:11px;color:var(--text-muted)}
  .st-date{font-size:11px;font-weight:500;margin-left:auto;padding:2px 8px;border-radius:20px}
  .st-date.late{background:#FCEBEB;color:#A32D2D}
  .st-date.soon{background:#FAEEDA;color:#633806}
  .st-date.ok{background:#EAF3DE;color:#27500A}

  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .dg-item label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}
  .dg-item p{font-size:14px;color:var(--text);margin-top:3px}
  .note-box{background:var(--bg);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text-muted);margin-bottom:16px;border:1px solid var(--border);font-style:italic}

  /* FORM */
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .form-group{display:flex;flex-direction:column;gap:5px}
  .form-group.full{grid-column:1/-1}
  .form-group label{font-size:12px;font-weight:500;color:var(--text-muted)}
  .form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .12s}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
  .form-group textarea{resize:vertical;min-height:60px}
  .tc-hint{font-size:11px;color:var(--accent);margin-top:3px;min-height:16px}

  /* AUTOCOMPLETE */
  .autocomplete-wrap{position:relative}
  .autocomplete-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:500;max-height:220px;overflow-y:auto;display:none}
  .autocomplete-dropdown.open{display:block}
  .ac-item{padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover,.ac-item.selected{background:var(--accent-light)}
  .ac-ref{font-size:13px;font-weight:500;color:var(--text);flex:1}
  .ac-ref mark{background:transparent;color:var(--accent);font-weight:700;text-decoration:none}
  .ac-client{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0}
  .ac-tc{font-size:11px;color:var(--text-faint);flex-shrink:0}
  .ac-empty{padding:14px;text-align:center;font-size:13px;color:var(--text-faint)}

  .close-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;display:flex;align-items:center;padding:4px;border-radius:6px;transition:background .1s}
  .close-btn:hover{background:var(--bg)}
  .step-nav{display:flex;gap:8px;flex-wrap:wrap}
  .step-nav .spacer{flex:1}
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text-muted);font-size:14px;padding:40px}
  .empty i{font-size:40px;color:var(--text-faint)}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}
  ::-webkit-scrollbar{width:6px;height:6px}
  /* Barre de progression 3M */
  .prog-bar{height:10px;border-radius:5px;background:var(--border);overflow:hidden;margin:6px 0}
  .prog-fill{height:100%;border-radius:5px;transition:width .4s ease}
  .ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:8px;transition:box-shadow .15s}
  .ref-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
  .ref-card.complete{border-color:#C0DD97;background:linear-gradient(135deg,#FAFFF6,var(--surface))}
  .cat-table{width:100%;border-collapse:collapse;font-size:13px}
  .cat-table th{padding:9px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
  .cat-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .cat-table tr:hover td{background:var(--bg)}
  .cat-input{width:100%;padding:5px 8px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--text);font-size:13px;font-family:var(--font)}
  .cat-input:focus{border-color:var(--accent);background:var(--bg);outline:none}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border-med);border-radius:3px}
</style>
</head>
<body>

<!-- ALERT BANNER -->
<!-- ALERT BANNER -->
<div class="alert-banner" id="alert-banner">
  <i class="ti ti-alert-triangle"></i>
  <div>
    <strong id="alert-count"></strong> — <span id="alert-desc"></span>
    <div class="alert-banner-list" id="alert-list"></div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-logo"><i class="ti ti-settings-cog"></i>PlanProd</div>
  <div class="topbar-divider"></div>
  <div class="topbar-search">
    <i class="ti ti-search"></i>
    <input type="text" id="search" placeholder="Rechercher un OF, produit…" oninput="render()">
  </div>
  <div class="topbar-right">
    <div class="save-status" id="save-status"><i class="ti ti-cloud-check"></i><span id="save-label">Connecté</span></div>
    <span class="topbar-date" id="topbar-date"></span>
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">Vues</div>
    <button class="sidebar-item active" id="nav-kanban" onclick="setView('kanban')"><i class="ti ti-layout-columns"></i>Kanban</button>
    <button class="sidebar-item" id="nav-list" onclick="setView('list')"><i class="ti ti-list-details"></i>Liste</button>
    <button class="sidebar-item" id="nav-archives" onclick="setView('archives')"><i class="ti ti-archive"></i>Archives<span class="sidebar-badge" id="badge-archives">0</span></button>
    <button class="sidebar-item" id="nav-3m" onclick="setView('3m')"><i class="ti ti-star"></i>Objectif 3M</button>
    <button class="sidebar-item" id="nav-catalogue" onclick="setView('catalogue')"><i class="ti ti-database"></i>Catalogue</button>

    <div class="sidebar-section">Filtres</div>
    <button class="sidebar-item" id="nav-all" onclick="setSideFilter('all')"><i class="ti ti-clipboard-list"></i>Tous les OF<span class="sidebar-badge" id="badge-all">0</span></button>
    <button class="sidebar-item" id="nav-bloque" onclick="setSideFilter('bloque')"><i class="ti ti-alert-triangle"></i>En retard<span class="sidebar-badge alert" id="badge-bloque">0</span></button>
    <button class="sidebar-item" id="nav-haute" onclick="setSideFilter('haute')"><i class="ti ti-flame"></i>Priorité haute<span class="sidebar-badge" id="badge-haute" style="background:#FCEBEB;color:#A32D2D">0</span></button>
    <button class="sidebar-item" id="nav-basse" onclick="setSideFilter('basse')"><i class="ti ti-leaf"></i>Priorité basse<span class="sidebar-badge" id="badge-basse">0</span></button>

<script>
// ─── CLIENT MAPPING ──────────────────────────────────────────────────────────
const REF_CLIENT_MAP = {"W0":"3M","W1":"3M","W2":"3M","W3":"3M","W40":"3M","W41":"3M","W42":"3M","W43":"3M","RS1208":"APOL","RS1209":"APOL","RS1210":"APOL","RS1275":"APOL","RS1410":"APOL","RS1411":"APOL","RS1412":"APOL","RS1495":"APOL","RS1610":"APOL","RS1611":"APOL","RS1612":"APOL","RS1613":"APOL","K05":"BRASSELER","K07":"BRASSELER","K09":"BRASSELER","K11":"BRASSELER","K101":"BRASSELER","K102":"BRASSELER","K104":"BRASSELER","K105":"BRASSELER","K107":"BRASSELER","K108":"BRASSELER","K110":"BRASSELER","K111":"BRASSELER","K130":"BRASSELER","K135":"BRASSELER","K140":"BRASSELER","K145":"BRASSELER","K155":"BRASSELER","K300":"BRASSELER","K05 L27":"BRASSELER","K07 L27":"BRASSELER","K09 L27":"BRASSELER","K11L27":"BRASSELER","PF 0,8":"GC","PF 1,0":"GC","PF 1,2":"GC","PF 1,4":"GC","PF 1,6":"GC","PF 1,2 BOL":"GC","PF 1,4 BOL":"GC","PF 1,6 BOL":"GC","S1":"MAILLEFER","S2":"MAILLEFER","S3":"MAILLEFER","S4":"MAILLEFER","S5":"MAILLEFER","S6":"MAILLEFER","S1 blanc":"MAILLEFER","S2 blanc":"MAILLEFER","S3 blanc":"MAILLEFER","S4 blanc":"MAILLEFER","S5 blanc":"MAILLEFER","S6 blanc":"MAILLEFER","AD1_JTR":"RTD","AD2_JTR":"RTD","AD3_JTR":"RTD","AD4_JTR":"RTD","AE1_JTR":"RTD","AE2_JTR":"RTD","AE3_JTR":"RTD","AE4_JTR":"RTD","AE5_JTR":"RTD","AE6_JTR":"RTD","AE1 ill XRO":"RTD","AE2 ill XRO":"RTD","AE3 ill XRO":"RTD","AE4 ill XRO":"RTD","AE5 ill XRO":"RTD","AE6 ill XRO":"RTD","ML_OVALE_1":"RTD","ML_OVALE_2":"RTD","ML_OVALE_3":"RTD","ML_OVALE_4":"RTD","80.04SG_JTR":"RTD","90.06SG_JTR":"RTD","100.08SG_JTR":"RTD","120.10SG_JTR":"RTD","80.04_ILLU_XRO_NOIR":"RTD","90.06_ILLU_XRO_ROUGE":"RTD","100.08_ILLU_XRO_JAUN":"RTD","120.10_ILLU_XRO_BLEU":"RTD","100SG_JTR":"RTD","120SG_JTR":"RTD","90SG_JTR":"RTD","AH1":"SHOFU","AH2":"SHOFU","AH3":"SHOFU","AH4":"SHOFU","16_JAR":"TOKUYAMA","17_JAR":"TOKUYAMA","18_JAR":"TOKUYAMA","19_JAR":"TOKUYAMA","L01_JTR":"TULSA DENTSPLY","L02_JTR":"TULSA DENTSPLY","L03_JTR":"TULSA DENTSPLY","N0":"ULTRADENT","N1":"ULTRADENT","N100":"ULTRADENT","N2":"ULTRADENT","N3":"ULTRADENT","N4":"ULTRADENT"};

const CLIENT_MAP = {
  "3M":            {bg:"#E6F1FB",text:"#0C447C",dot:"#4C8EDA"},
  "APOL":          {bg:"#EEF4FF",text:"#1A3A8F",dot:"#3B6FD4"},
  "BRASSELER":     {bg:"#F0EBF8",text:"#4A1580",dot:"#8B45D4"},
  "GC":            {bg:"#E6F9F0",text:"#075C2F",dot:"#12A355"},
  "MAILLEFER":     {bg:"#FFF0E6",text:"#7A3500",dot:"#D4621A"},
  "RTD":           {bg:"#EDFAF5",text:"#064535",dot:"#0F9065"},
  "SHOFU":         {bg:"#FFF3F3",text:"#7A1515",dot:"#D41A1A"},
  "TOKUYAMA":      {bg:"#F3F0FF",text:"#3A1580",dot:"#6B45D4"},
  "TULSA DENTSPLY":{bg:"#FFF8E6",text:"#5C4000",dot:"#D49A12"},
  "ULTRADENT":     {bg:"#E6FBF8",text:"#044840",dot:"#0A8070"},
};

const DEFAULT_CLIENT = {bg:"#F1EFE8",text:"#444441",dot:"#888780"};

function detectClient(ref) {
  if (!ref) return null;
  const r = ref.trim();
  const rL = r.toLowerCase().replace(/\s+/g," ");
  if (REF_CLIENT_MAP[r]) return REF_CLIENT_MAP[r];
  for (const [k,v] of Object.entries(REF_CLIENT_MAP)) {
    if (k.toLowerCase() === rL) return v;
  }
  for (const [k,v] of Object.entries(REF_CLIENT_MAP)) {
    if (rL.includes(k.toLowerCase())) return v;
  }
  const ru = r.toUpperCase().replace(/\s+/g,"");
  if (ru.startsWith("W") && /^W\d/.test(ru)) return "3M";
  if (ru.startsWith("RS")) return "APOL";
  if (ru.startsWith("K")) return "BRASSELER";
  if (ru.startsWith("PF")) return "GC";
  if (ru.startsWith("S") && /^S\d/.test(ru)) return "MAILLEFER";
  if (ru.startsWith("AD")||ru.startsWith("AE")||ru.startsWith("ML")) return "RTD";
  if (ru.startsWith("AH")) return "SHOFU";
  if (/^\d+_JAR/.test(r)||/^\d+JAR/.test(ru)) return "TOKUYAMA";
  if (ru.startsWith("L0")) return "TULSA DENTSPLY";
  if (ru.startsWith("N") && /^N\d/.test(ru)) return "ULTRADENT";
  return null;
}

function allClients() {
  return Object.assign({}, CLIENT_MAP, customClients);
}

function clientStyle(ref) {
  const c = detectClientFull ? detectClientFull(ref) : detectClient(ref);
  const all = allClients();
  return (c && all[c]) ? all[c] : DEFAULT_CLIENT;
}

function detectClientFull(ref) {
  if (!ref) return null;
  for (const [name, cfg] of Object.entries(customClients)) {
    const prefixes = cfg.prefixes || [];
    if (prefixes.some(p => ref.toUpperCase().startsWith(p.toUpperCase()))) return name;
  }
  return detectClient(ref);
}


// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const HEURES_PAR_JOUR = 24;
// Durées par défaut (heures) — modifiables via Paramètres
let DUREES_ETAPES = {creation:0, attente:0, usinage:null, controle:4, joint:8, blister:8, boite:4};
let parametres = { durees: {...DUREES_ETAPES} };

  {id:'boite',label:'Mise en boîte',icon:'ti-box',color:'#4A8C1A',bg:'var(--c-boite-bg)',text:'var(--c-boite-text)',border:'#C0DD97'},

// ─── CALCULS DATES ────────────────────────────────────────────────────────────
function lookupTC(ref) {
  if (!ref) return null;
  const r = ref.trim();
  const rL = r.toLowerCase().replace(/\s+/g,' ');
  // Chercher dans le catalogue dynamique
  const entry = catalogue.find(c => {
    const cr = c.ref.toLowerCase().replace(/\s+/g,' ');
    return cr === rL || rL.includes(cr) || cr.includes(rL);
  });
  if (entry && entry.tc) return entry.tc;
  return null;
}

function addJoursOuvresRapide(dateStr, heures) {
  if (!dateStr || heures === null || heures === undefined) return null;
  let jours = Math.ceil(heures / HEURES_PAR_JOUR);
  let d = new Date(dateStr + 'T12:00:00');
  let ajoutes = 0;
  while (ajoutes < jours) { d.setDate(d.getDate()+1); if (d.getDay()!==0) ajoutes++; }
  return d.toISOString().slice(0,10);
}

function calcDates(of) {
  const tc = lookupTC(of.produit);
  const dureesH = {
    creation:0, attente:0,
    usinage: tc!==null ? (of.qty*tc)/3600 : null,
    controle:DUREES_ETAPES.controle, joint:DUREES_ETAPES.joint,
    blister:DUREES_ETAPES.blister, boite:DUREES_ETAPES.boite,
  };
  const dates = {};
  let cursor = of.date;
  for (const s of STAGES) {
    const h = dureesH[s.id];
    if (h===null||h===undefined) { dates[s.id]=null; }
    else if (h===0) { dates[s.id]=cursor; }
    else { const fin=addJoursOuvresRapide(cursor,h); dates[s.id]=fin; cursor=fin||cursor; }
  }
  return {dates, tc, dureesH};
}

function deadlineStatus(dateStr) {
  if (!dateStr) return 'unknown';
  const today=new Date(); today.setHours(0,0,0,0);
  const d=new Date(dateStr+'T00:00:00');
  const diff=(d-today)/86400000;
  if (diff<0) return 'late';
  if (diff<=3) return 'soon';
  return 'ok';
}

function isBlocked(of) {
  const {dates} = calcDates(of);
  const fin = dates[of.stage];
  return fin && deadlineStatus(fin) === 'late';
}

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

function leadTime(dateDebut, dateFin) {
  if (!dateDebut || !dateFin) return null;
  const d1 = new Date(dateDebut+'T00:00:00');
  const d2 = new Date(dateFin+'T00:00:00');
  const diff = Math.round((d2 - d1) / 86400000);
  return diff >= 0 ? diff : null;
}

function leadTimeFmt(jours) {
  if (jours === null || jours === undefined) return '—';
  if (jours < 7) return jours+'j';
  const s = Math.floor(jours/7);
  const r = jours % 7;
  return r > 0 ? `${s}sem ${r}j` : `${s}sem`;
}

function dureeFmt(heures) {
  if (heures===null||heures===undefined) return '?';
  if (heures===0) return 'immédiat';
  const j=Math.floor(heures/HEURES_PAR_JOUR);
  const h=Math.round(heures%HEURES_PAR_JOUR*10)/10;
  if (j===0) return `${h}h`; if (h===0) return `${j}j`; return `${j}j ${h}h`;
}

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
function setSaveStatus(status,msg) {
  const el=document.getElementById('save-status');
  el.className='save-status '+status;
  document.getElementById('save-label').textContent=msg;
  const icons={saving:'ti-cloud-upload',saved:'ti-cloud-check',error:'ti-cloud-off'};
  el.querySelector('i').className='ti '+(icons[status]||'ti-cloud');
}

// ─── DONNÉES EMBARQUÉES ───────────────────────────────────────────────────────
function loadEmbedded() {
  try {
    const tag = document.getElementById('initial-data');
    if (!tag) return;
    const d = JSON.parse(tag.textContent);
    ofs         = d.ofs         || [];
    archives    = d.archives    || [];
    nextId      = d.nextId      || 1;
    catalogue   = d.catalogue   || [];
    objectifs3m = d.objectifs_3m|| {};
    const activeIds = new Set(ofs.map(o=>o.id));
    archives = archives.filter(a=>!activeIds.has(a.id));
  } catch(e) {
    console.warn('loadEmbedded:', e);
  }
}

async function loadData() {
  // Toujours charger les données embarquées en premier (affichage immédiat garanti)
  loadEmbedded();
  try {
    const res=await fetch(API,{signal:AbortSignal.timeout(3000)});
    if(!res.ok) throw new Error();
    const data=await res.json();
    ofs=data.ofs||[]; archives=data.archives||[];
    nextId=data.nextId||(ofs.length+1);
    catalogue=data.catalogue||[]; objectifs3m=data.objectifs_3m||{};
    const activeIds=new Set(ofs.map(o=>o.id));
    archives=archives.filter(a=>!activeIds.has(a.id));
    serverAvailable=true; setSaveStatus('saved','Synchronisé');
  } catch {
    serverAvailable=false;
    setSaveStatus('error','Hors ligne — modifications non sauvegardées');
  }
  render();
}

function scheduleSave() {
  if(!serverAvailable) return;
  clearTimeout(saveTimeout); setSaveStatus('saving','Sauvegarde…');
  saveTimeout=setTimeout(saveData,800);
}

async function saveData() {
  try {
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ofs,archives,nextId,catalogue,objectifs_3m:objectifs3m}),signal:AbortSignal.timeout(5000)});
    if(!res.ok) throw new Error();
    setSaveStatus('saved','Sauvegardé'); setTimeout(()=>setSaveStatus('saved','Synchronisé'),2000);
  } catch { setSaveStatus('error','Échec sauvegarde'); }
}

setInterval(async()=>{
  if(!serverAvailable) return;
  try{const r=await fetch(API,{signal:AbortSignal.timeout(3000)});const d=await r.json();ofs=d.ofs||[];archives=d.archives||[];nextId=d.nextId||nextId;render();}catch{}
},30000);

function stageOf(id){return STAGES.find(s=>s.id===id);}
function today(){return new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}

function buildSidebar() {
  const sidebar=document.getElementById('sidebar');
  sidebar.querySelectorAll('.stage-nav-item').forEach(e=>e.remove());
  STAGES.forEach(s=>{
    const count=ofs.filter(o=>o.stage===s.id).length;

    sidebar.appendChild(btn);

function setSideFilter(f) {
  sideFilter=f; stageFilter=f.startsWith('stage:')?f.replace('stage:',''):'';
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  const map={all:'nav-all',bloque:'nav-bloque',haute:'nav-haute',basse:'nav-basse',kanban:'nav-kanban',list:'nav-list',archives:'nav-archives'};
  if(map[f]) document.getElementById(map[f])?.classList.add('active');
  render();
}

function setSort(field) {
  if (sortField === field) { sortDir *= -1; }
  else { sortField = field; sortDir = 1; }
  const btn = document.getElementById('sort-dir-btn');
  if (btn) btn.innerHTML = sortDir === 1
    ? '<i class="ti ti-sort-ascending"></i>'
    : '<i class="ti ti-sort-descending"></i>';
  document.getElementById('sort-field').value = field;
  render();
}

function toggleSortDir() {
  sortDir *= -1;
  const btn = document.getElementById('sort-dir-btn');
  if (btn) btn.innerHTML = sortDir === 1
    ? '<i class="ti ti-sort-ascending"></i>'
    : '<i class="ti ti-sort-descending"></i>';
  render();
}

function sortedOfs(data) {
  if (!sortField) return data;
  return [...data].sort((a, b) => {
    let va, vb;
    if (sortField === 'id') {
      va = parseInt(a.id.replace('OF-','')) || 0;
      vb = parseInt(b.id.replace('OF-','')) || 0;
    } else if (sortField === 'date') {
      va = a.date || ''; vb = b.date || '';
    } else if (sortField === 'deadline') {
      va = calcDates(a).dates[a.stage] || '9999';
      vb = calcDates(b).dates[b.stage] || '9999';
    } else if (sortField === 'produit') {
      va = a.produit.toLowerCase(); vb = b.produit.toLowerCase();
    } else { return 0; }
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
}

function filteredOfs() {
  const search=document.getElementById('search').value.toLowerCase();
  const prio=document.getElementById('filter-prio').value;
  const filtered = ofs.filter(o=>{
    if(search&&!o.id.toLowerCase().includes(search)&&!o.produit.toLowerCase().includes(search)) return false;
    if(prio&&o.prio!==prio) return false;
    if(sideFilter==='haute'&&o.prio!=='haute') return false;
    if(sideFilter==='basse'&&o.prio!=='basse') return false;
    if(sideFilter==='bloque'&&!isBlocked(o)) return false;
    if(stageFilter&&o.stage!==stageFilter) return false;
    return true;
  });
  return sortedOfs(filtered);
}

function cardHtml(o,s) {

// ─── LIST ─────────────────────────────────────────────────────────────────────

  const thStyle = 'cursor:pointer;user-select:none;';
  const th = (label, field) => {
    const active = sortField === field;
    const arrow = active ? (sortDir===1?' ↑':' ↓') : '';
    return `<span style="${thStyle}${active?'color:var(--accent)':''}" onclick="setSort('${field}')">${label}${arrow}</span>`;
  };
  lv.innerHTML=`<div class="list-header">${th('Référence','id')}<span>Client</span>${th('Produit','produit')}<span>Étape</span><span>Qté</span><span>Priorité</span>${th('Création','date')}<span>${th('Fin étape','deadline')}</span><span></span></div>`
    +data.map(o=>{
      const s=stageOf(o.stage);const pc=PRIO[o.prio];

      return `<div class="list-row${st==='late'?' blocked':''}" onclick="openDetail('${o.id}')">
        <span class="of-ref-tag">${o.id}</span>
        <span><span style="font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;background:${cs.bg};color:${cs.text}">${client}</span></span>
        <span style="font-weight:500">${o.produit}</span>
        <span><span class="stage-pill" style="background:${s.bg};color:${s.text}"><span class="stage-dot" style="background:${s.color};width:6px;height:6px"></span>${s.label}</span></span>
        <span>${o.qty.toLocaleString('fr')}</span>
        <span><span class="prio-pill" style="background:${pc.bg};color:${pc.text}">${pc.label}</span></span>
        <span style="font-size:12px;color:var(--text-muted)">${o.date}</span>
        <span>${fin?`<span class="deadline-badge" style="background:${st==='late'?'#FCEBEB':st==='soon'?'#FAEEDA':'#EAF3DE'};color:${st==='late'?'#A32D2D':st==='soon'?'#633806':'#27500A'}">${fmtDate(fin)}</span>`:'<span style="color:var(--text-faint);font-size:11px">—</span>'}</span>

// ─── ARCHIVES ─────────────────────────────────────────────────────────────────
function renderArchives() {
  const av = document.getElementById('archive-view');
  if (!archives.length) { av.innerHTML = '<div class="empty"><i class="ti ti-archive"></i>Aucun OF archivé</div>'; return; }

  const searchA = (document.getElementById('search-archive')?.value || '').toLowerCase();
  const moisF   = document.getElementById('filter-mois-archive')?.value || '';
  const confF   = document.getElementById('filter-conf-archive')?.value || '';

  let data = archives.filter(a => {
    if (searchA && !a.id.toLowerCase().includes(searchA) && !(a.produit||'').toLowerCase().includes(searchA)) return false;
    if (moisF && a.mois !== moisF) return false;
    if (confF === 'nc_qualite') {
      const pct = a.qty_conf != null && a.qty_ctrl ? (a.qty_conf / a.qty_ctrl * 100) : 100;
      if (pct >= 99) return false;
    }
    if (confF === 'nc_delai' && a.conforme_delai !== 'Non') return false;
    if (confF === 'sans_controle' && a.valide_controle) return false;
    return true;
  });

  const moisDispo = [...new Set(archives.map(a => a.mois).filter(Boolean))];
  const MOIS_ORDER = ['Janv','Fév','Mars','Avril','Mai','Juin','Juil','Août','Sept','Oct','Nov','Déc'];
  moisDispo.sort((a,b) => MOIS_ORDER.indexOf(a) - MOIS_ORDER.indexOf(b));

  av.innerHTML = `
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <div style="position:relative;flex:1;max-width:260px">
        <i class="ti ti-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-faint);font-size:15px"></i>
        <input id="search-archive" value="${searchA}" placeholder="Rechercher OF, produit…"
          style="width:100%;padding:7px 12px 7px 32px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none"
          oninput="renderArchives()">
      </div>
      <select id="filter-mois-archive" class="filter-select" onchange="renderArchives()">
        <option value="">Tous les mois</option>
        ${moisDispo.map(m=>`<option value="${m}" ${moisF===m?'selected':''}>${m}</option>`).join('')}
      </select>
      <select id="filter-conf-archive" class="filter-select" onchange="renderArchives()">
        <option value="">Tous</option>
        <option value="nc_delai" ${confF==='nc_delai'?'selected':''}>Non conformes délai</option>
        <option value="nc_qualite" ${confF==='nc_qualite'?'selected':''}>Non conformes qualité</option>
        <option value="sans_controle" ${confF==='sans_controle'?'selected':''}>Sans contrôle CRTenons</option>
      </select>
      <span style="font-size:12px;color:var(--text-muted);margin-left:auto">${data.length} OF sur ${archives.length}</span>
    </div>
    <div style="overflow-x:auto;flex:1">
      <div style="display:grid;grid-template-columns:110px 80px 1fr 90px 100px 100px 70px 60px 70px 80px 80px 36px;gap:6px;padding:7px 12px;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;min-width:1100px">
        <span>N° OF</span><span>Client</span><span>Produit</span><span>Machine</span>
        <span>Début prod.</span><span>Fin réelle</span><span>Lead time</span><span>Écart</span>
        <span>Qté</span><span>Qualité</span><span>Délai</span><span></span>
      </div>
      ${data.length ? data.map(a => {
        const cs = clientStyle(a.produit); const client = detectClient(a.produit) || '—';
        const pctConf = a.qty_conf != null && a.qty_ctrl ? Math.round(a.qty_conf / a.qty_ctrl * 100) : null;
        const confQBg    = pctConf === null ? 'var(--bg)' : pctConf >= 99 ? '#EAF3DE' : pctConf >= 95 ? '#FAEEDA' : '#FCEBEB';
        const confQColor = pctConf === null ? 'var(--text-faint)' : pctConf >= 99 ? '#27500A' : pctConf >= 95 ? '#633806' : '#A32D2D';
        const ecart = a.ecart_j;
        const ecartBg    = ecart === null ? 'var(--bg)' : ecart <= 0 ? '#EAF3DE' : ecart <= 2 ? '#FAEEDA' : '#FCEBEB';
        const ecartColor = ecart === null ? 'var(--text-faint)' : ecart <= 0 ? '#27500A' : ecart <= 2 ? '#633806' : '#A32D2D';
        const ecartTxt   = ecart === null ? '—' : ecart === 0 ? '0j' : ecart > 0 ? '+'+ecart+'j' : ecart+'j';
        const delaiOk    = a.conforme_delai === 'Oui';
        const delaiTxt   = a.conforme_delai || '—';
        const hasCtrl    = a.valide_controle;
        const lt = leadTime(a.date, a.archivedAt);
        const ltFmt = leadTimeFmt(lt);
        const ltBg = lt===null?'var(--bg)':lt<=14?'#EAF3DE':lt<=21?'#FAEEDA':'#FCEBEB';
        const ltColor = lt===null?'var(--text-faint)':lt<=14?'#27500A':lt<=21?'#633806':'#A32D2D';

          <span style="font-weight:600;color:var(--accent);opacity:.8">${a.id}</span>
          <span><span style="font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;background:${cs.bg};color:${cs.text}">${client}</span></span>
          <span style="font-weight:500;color:var(--text-muted)">${a.produit}</span>

          <span><span style="font-size:11px;font-weight:600;padding:2px 6px;border-radius:20px;background:${ecartBg};color:${ecartColor}">${ecartTxt}</span></span>
          <span>${(a.qty||0).toLocaleString('fr')}</span>
          <span>${hasCtrl ? `<span style="font-size:11px;font-weight:600;padding:2px 6px;border-radius:20px;background:${confQBg};color:${confQColor}">${pctConf !== null ? pctConf+'%' : '—'}</span>` : '<span style="font-size:10px;color:var(--text-faint)">—</span>'}</span>
          <span><span style="font-size:11px;font-weight:600;padding:2px 6px;border-radius:20px;background:${delaiTxt==='—'?'var(--bg)':delaiOk?'#EAF3DE':'#FCEBEB'};color:${delaiTxt==='—'?'var(--text-faint)':delaiOk?'#27500A':'#A32D2D'}">${delaiTxt}</span></span>
          <span><button class="btn" style="padding:3px 7px;font-size:11px" title="Rouvrir" onclick="rouvrir('${a.id}')"><i class="ti ti-restore"></i></button></span>
        </div>`;
      }).join('') : '<div class="empty" style="padding:32px"><i class="ti ti-inbox"></i>Aucun OF pour ces filtres</div>'}
    </div>`;
}

function render() {
  renderStats(); buildSidebar(); renderAlertBanner();

  else if(currentView==='archives') renderArchives();
  else if(currentView==='3m') render3M();

}

function setView(v) {
  currentView=v;
  const views={'kanban':'kanban-view','list':'list-view','archives':'archive-view','3m':'view-3m','catalogue':'view-catalogue'};
  Object.entries(views).forEach(([k,id])=>{
    const el=document.getElementById(id);
    if(el) el.style.display=k===v?(k==='kanban'?'flex':k==='list'?'flex':'flex'):'none';
  });
  const navMap={kanban:'nav-kanban',list:'nav-list',archives:'nav-archives','3m':'nav-3m',catalogue:'nav-catalogue'};
  document.querySelectorAll('.sidebar-item').forEach(b=>b.classList.remove('active'));
  if(navMap[v]) document.getElementById(navMap[v])?.classList.add('active');
  if(v==='kanban'||v==='list'){sideFilter='all';stageFilter='';}
  render();
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────

    <div style="font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Avancement</div>

function timelineHtml(o) {
  const ci=STAGES.findIndex(s=>s.id===o.stage);
  const {dates,dureesH,tc}=calcDates(o);
  return `<div class="stage-timeline">
    ${STAGES.map((s,i)=>{
      const fin=dates[s.id];const h=dureesH[s.id];

        <span class="st-label" style="color:${isDone?'var(--text-muted)':isActive?'var(--accent-text)':'var(--text-faint)'}">${s.label}</span>
        <span class="st-duration">${s.id==='usinage'&&tc?dureeFmt(h)+' ('+tc+'s/u)':dureeFmt(h)}</span>
        <span class="st-date ${fin?st:''}">${fin?fmtDate(fin):'—'}</span>

    }).join('')}

}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function moveStage(id,dir) {
  const o=ofs.find(x=>x.id===id);if(!o)return;
  const ci=STAGES.findIndex(s=>s.id===o.stage);
  const ni=ci+dir;if(ni<0||ni>=STAGES.length)return;
  o.stage=STAGES[ni].id;
  if(!o.stageEnteredAt) o.stageEnteredAt={};
  o.stageEnteredAt[o.stage]=todayStr();
  closeOverlay();render();scheduleSave();
}

function archiverOf(id) {
  if(!confirm('Clôturer et archiver cet OF ? Il sera déplacé dans les archives.')) return;
  const o=ofs.find(x=>x.id===id);if(!o)return;
  archives.unshift({...o, archivedAt:todayStr()});
  ofs=ofs.filter(x=>x.id!==id);
  closeOverlay();render();scheduleSave();
  showToast(`${id} archivé avec succès`);
}

function rouvrir(id) {
  if(!confirm('Rouvrir cet OF archivé ? Il retournera en "Mise en boîte".')) return;
  const a=archives.find(x=>x.id===id);if(!a)return;
  const o={...a};
  delete o.archivedAt;
  o.stage='boite';
  if(!o.stageEnteredAt) o.stageEnteredAt={};
  o.stageEnteredAt.boite=todayStr();
  ofs.push(o);
  archives=archives.filter(x=>x.id!==id);
  render();scheduleSave();
  showToast(`${id} réouvert`);
}

function deleteOf(id) {
  if(!confirm('Supprimer définitivement cet OF ?')) return;
  ofs=ofs.filter(o=>o.id!==id);closeOverlay();render();scheduleSave();
}

// ─── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
let acIndex = -1;
let acMousedown = false; // évite la fermeture du dropdown au clic

function acInput() {
  acIndex = -1;
  const q = (document.getElementById('f-produit')?.value || '').trim().toLowerCase();
  const dd = document.getElementById('ac-dropdown');
  if (!dd) return;
  if (!q) { dd.classList.remove('open'); updateTcHint(); return; }

  const results = catalogue.map(c=>c.ref)
    .filter(r => r.toLowerCase().includes(q))
    .sort((a, b) => {
      const aS = a.toLowerCase().startsWith(q), bS = b.toLowerCase().startsWith(q);
      if (aS && !bS) return -1; if (!aS && bS) return 1;
      return a.localeCompare(b);
    })
    .slice(0, 20);

  if (!results.length) {
    dd.innerHTML = '<div class="ac-empty">Aucune référence trouvée</div>';
    dd.classList.add('open'); updateTcHint(); return;
  }

  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  dd.innerHTML = results.map((r, i) => {
    const highlighted = r.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    const cs = clientStyle(r); const client = detectClient(r);
    return `<div class="ac-item" data-ref="${r}" data-idx="${i}">
      <span class="ac-ref">${highlighted}</span>
      ${client ? `<span class="ac-client" style="background:${cs.bg};color:${cs.text}">${client}</span>` : ''}
      <span class="ac-tc">${(catalogue.find(c=>c.ref===r)||{}).tc||'?'}s</span>
    </div>`;
  }).join('');

  // Attache les clics après injection du HTML
  dd.querySelectorAll('.ac-item').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); acMousedown = true; });
    el.addEventListener('click', () => { acSelect(el.dataset.ref); acMousedown = false; });
  });

  dd.classList.add('open');
  updateTcHint();
}

function acSelect(ref) {
  const inp = document.getElementById('f-produit');
  if (inp) { inp.value = ref; inp.focus(); }
  const dd = document.getElementById('ac-dropdown');
  if (dd) dd.classList.remove('open');
  acIndex = -1;
  updateTcHint();
}

function acKeydown(e) {
  const dd = document.getElementById('ac-dropdown');
  if (!dd || !dd.classList.contains('open')) { if(e.key==='Enter') e.preventDefault(); return; }
  const items = dd.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIndex = Math.min(acIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('selected', i === acIndex));
    items[acIndex]?.scrollIntoView({block:'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIndex = Math.max(acIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('selected', i === acIndex));
    items[acIndex]?.scrollIntoView({block:'nearest'});
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIndex >= 0) { const ref = items[acIndex]?.dataset.ref; if (ref) acSelect(ref); }
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

// Ferme le dropdown si on clique ailleurs (mais pas si c'est un item du dropdown)
document.addEventListener('click', e => {
  if (acMousedown) { acMousedown = false; return; }

  }
});

function updateTcHint() {
  const ref = document.getElementById('f-produit')?.value || '';
  const qty = parseInt(document.getElementById('f-qty')?.value) || 0;
  const date = document.getElementById('f-date')?.value || '';
  const hint = document.getElementById('tc-hint'); if (!hint) return;
  const tc = lookupTC(ref);
  if (!ref) { hint.textContent = ''; return; }
  if (tc === null) {
    hint.innerHTML = '<i class="ti ti-alert-circle" style="vertical-align:-2px"></i> Référence non trouvée dans le catalogue';
    hint.style.color = 'var(--text-faint)'; return;
  }
  const h = qty > 0 ? (qty * tc) / 3600 : null;
  const fin = h && date ? addJoursOuvresRapide(date, h) : null;
  hint.style.color = 'var(--accent)';
  hint.innerHTML = `<i class="ti ti-check" style="vertical-align:-2px"></i> ${tc}s/pièce — usinage : ${h ? dureeFmt(h) : '?'}${fin ? ' → fin le ' + fmtDate(fin) : ''}`;
}


function saveForm() {
  const produit=document.getElementById('f-produit').value.trim();
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  const date=document.getElementById('f-date').value;
  const prio=document.getElementById('f-prio').value;
  const stage=document.getElementById('f-stage').value;
  const note=document.getElementById('f-note').value.trim();
  const idInput=document.getElementById('f-id')?.value.trim();
  if(!produit){alert('Veuillez saisir la référence produit.');return;}
  if(editingId){
    const o=ofs.find(x=>x.id===editingId);
    if(o){
      // Mise à jour N° OF si changé
      if(idInput){
        const newId=`OF-${idInput}`;
        if(newId!==editingId && ofs.some(x=>x.id===newId)){
          alert("Ce numéro d'OF existe déjà.");return;
        }
        o.id=newId;
      }
      Object.assign(o,{produit,qty,date,prio,stage,note});
    }
  } else {
    const id=idInput?`OF-${idInput}`:`OF-${String(nextId++).padStart(3,'0')}`;
    if(ofs.some(x=>x.id===id)){alert("Ce numéro d'OF existe déjà.");return;}
    const stageEnteredAt={[stage]:todayStr()};
    ofs.push({id,produit,qty,stage,prio,date,note,stageEnteredAt});
    // Si c'est un produit 3M, s'assurer qu'il y a un objectif (même à 0)
    if (detectClient(produit) === '3M') {
      const ref = trouverRef3M(produit);
      if (ref && objectifs3m[ref] === undefined) objectifs3m[ref] = 0;
    }
  }
  closeOverlay();render();scheduleSave();
}

function closeOverlay(e) {
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');editingId=null;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay();});

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
let dragId = null;

function dragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}

function dragEnd(e) {
  e.target.classList.remove('dragging');
  document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over'));
}

function dragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function dragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget))
    e.currentTarget.classList.remove('drag-over');
}

function dragDrop(e, stageId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const o = ofs.find(x => x.id === dragId);
  if (!o || o.stage === stageId) return;
  o.stage = stageId;
  if (!o.stageEnteredAt) o.stageEnteredAt = {};
  o.stageEnteredAt[stageId] = todayStr();
  dragId = null;
  render();
  scheduleSave();
}

// ─── GESTION CLIENTS ──────────────────────────────────────────────────────────
// Clients personnalisés (stockés en plus du CLIENT_MAP par défaut)
let customClients = {};

function allClients() {
  // Fusion CLIENT_MAP + customClients, les custom écrasent
  return Object.assign({}, CLIENT_MAP, customClients);
}

function detectClientFull(ref) {
  if (!ref) return null;
  // D'abord chercher dans les clients custom par correspondance de préfixe
  for (const [name, cfg] of Object.entries(customClients)) {
    const prefixes = cfg.prefixes || [];
    if (prefixes.some(p => ref.toUpperCase().startsWith(p.toUpperCase()))) return name;
  }
  return detectClient(ref); // fallback fonction d'origine
}

function clientStyleFull(ref) {
  const c = detectClientFull(ref);
  if (!c) return DEFAULT_CLIENT;
  const all = allClients();
  return all[c] || DEFAULT_CLIENT;
}

function prefillClient(name, bg, text, dot, prefixes) {
  const inp = id => document.getElementById(id);
  if(inp('cl-name')) inp('cl-name').value = name;
  if(inp('cl-prefixes')) inp('cl-prefixes').value = prefixes;
  if(inp('cl-bg'))   { inp('cl-bg').value = bg;   }
  if(inp('cl-text')) { inp('cl-text').value = text; }
  if(inp('cl-dot'))  { inp('cl-dot').value = dot;  }
  // Déclencher le live preview
  ['cl-bg','cl-text','cl-dot','cl-name'].forEach(id => {
    inp(id)?.dispatchEvent(new Event('input'));
  });
  // Scroller vers le formulaire
  document.getElementById('cl-name')?.scrollIntoView({behavior:'smooth', block:'center'});
  document.getElementById('cl-name')?.focus();
}

function saveParametres() {
  // Sauvegarder les durées
  const stageIds = ['controle','joint','blister','boite'];
  for (const id of stageIds) {
    const val = parseFloat(document.getElementById('dur-'+id)?.value);
    if (!isNaN(val)) {
      parametres.durees[id] = val;
      DUREES_ETAPES[id] = val;
    }
  }
  closeOverlay();
  render();
  scheduleSave();
  showToast('Paramètres enregistrés');
}

function saveProduct(originalRef) {
  const ref     = document.getElementById('pf-ref').value.trim();
  const client  = document.getElementById('pf-client').value.trim();
  const matiere = document.getElementById('pf-matiere').value.trim();
  const machine = document.getElementById('pf-machine').value.trim();
  const tc      = parseFloat(document.getElementById('pf-tc').value)||null;
  if (!ref) { alert('La référence est obligatoire.'); return; }

  if (originalRef) {
    const idx = catalogue.findIndex(c => c.ref === originalRef);
    if (idx >= 0) catalogue[idx] = {ref, client, matiere, machine, tc};
    // Mettre à jour les objectifs 3M si le client change
    if (originalRef !== ref) {
      if (objectifs3m[originalRef] !== undefined) {
        objectifs3m[ref] = objectifs3m[originalRef];
        delete objectifs3m[originalRef];
      }
    }
  } else {
    if (catalogue.some(c => c.ref === ref)) { alert("Cette référence existe déjà."); return; }
    catalogue.push({ref, client, matiere, machine, tc});
  }
  // Ajouter aux objectifs 3M si client=3M
  if (client === '3M' && objectifs3m[ref] === undefined) objectifs3m[ref] = 0;
  if (client !== '3M' && originalRef && objectifs3m[originalRef] !== undefined) delete objectifs3m[originalRef];

  closeOverlay();
  renderCatalogue();
  scheduleSave();
  showToast(originalRef ? "Produit mis à jour" : "Produit créé");
}

function deleteProduct(ref) {
  if (!confirm(`Supprimer la référence "${ref}" du catalogue ?`)) return;
  catalogue = catalogue.filter(c => c.ref !== ref);
  delete objectifs3m[ref];
  closeOverlay();
  renderCatalogue();
  scheduleSave();
}

// ─── VUE 3M ───────────────────────────────────────────────────────────────────
function get3MData() {
  // Toutes les références 3M connues : catalogue + objectifs existants
  const refsFromCat  = catalogue.filter(c => c.client === '3M').map(c => c.ref);
  const refsFromObj  = Object.keys(objectifs3m);
  const refs3m = [...new Set([...refsFromCat, ...refsFromObj])].sort();

  // S'assurer que chaque référence 3M a un objectif (même à 0)
  refs3m.forEach(r => { if (objectifs3m[r] === undefined) objectifs3m[r] = 0; });

  // OF en cours pour 3M (tous stages sauf archivés)
  const ofsEnCours = ofs.filter(o => detectClient(o.produit) === '3M');

  // Quantités produites par référence :
  // 1. Archives (OF terminés + validés)
  const qtyArchivees = {};
  archives.filter(a => detectClient(a.produit) === '3M').forEach(a => {
    const ref = trouverRef3M(a.produit);
    if (ref) qtyArchivees[ref] = (qtyArchivees[ref]||0) + (a.qty_conf||a.qty_ctrl||a.qty||0);
  });

  // 2. OF kanban archivés manuellement (étape boite clôturée)
  // déjà dans archives ci-dessus

  return {refs3m, obj: objectifs3m, ofsEnCours, qtyArchivees};
}

function trouverRef3M(produit) {
  if (!produit) return null;
  const p = produit.trim();
  const pU = p.toUpperCase().replace(/\s+/g,'');

  // 1. Correspondance exacte dans le catalogue 3M
  const exact = catalogue.find(c => c.client === '3M' && c.ref.trim() === p);
  if (exact) return exact.ref;

  // 2. Correspondance insensible à la casse
  const ci = catalogue.find(c => c.client === '3M' &&
    c.ref.trim().toUpperCase().replace(/\s+/g,'') === pU);
  if (ci) return ci.ref;

  // 3. La ref du catalogue est contenue dans le produit (ex: "W1 JTO" → "W1")
  // Trier par longueur décroissante pour matcher le plus long en premier
  const sorted3m = catalogue.filter(c=>c.client==='3M')
    .sort((a,b)=>b.ref.length-a.ref.length);
  for (const c of sorted3m) {
    const r = c.ref.trim().toUpperCase().replace(/\s+/g,'');
    if (pU.startsWith(r) || pU.includes(r)) return c.ref;
  }

  // 4. Le produit est contenu dans la ref (ex: "W1" dans objectifs, produit "W1")
  for (const ref of Object.keys(objectifs3m)) {
    const rU = ref.trim().toUpperCase().replace(/\s+/g,'');
    if (pU === rU || pU.startsWith(rU)) return ref;
  }

  return null;
}

    const pct      = objectif > 0 ? Math.min(100, Math.round(fait/objectif*100)) : 0;

        <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">OF en cours</div>

}

function saveObjectif(ref) {
  const val = parseInt(document.getElementById('obj-val')?.value)||0;

  closeOverlay();
  render3M();
  scheduleSave();
  showToast(`Objectif ${ref} mis à jour : ${val.toLocaleString('fr')} pièces`);
}
