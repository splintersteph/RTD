// ─── SWIPE MOBILE ──────────────────────────────────────────────────────────
let swipeStartX = 0, swipeStartY = 0;

function initSwipe() {
  const kv = document.getElementById('kanban-view');
  if (!kv) return;
  kv.addEventListener('touchstart', e => {
    swipeStartX = e.touches[0].clientX;
    swipeStartY = e.touches[0].clientY;
  }, {passive: true});
  kv.addEventListener('touchend', e => {
    if (!isMobile()) return;
    const dx = e.changedTouches[0].clientX - swipeStartX;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
      // Swipe horizontal détecté
      if (dx < 0) mobileStageNav(1);  // swipe gauche → étape suivante
      else mobileStageNav(-1);         // swipe droite → étape précédente
    }
  }, {passive: true});
}


// ─── MODIFICATION DES DATES ───────────────────────────────────────────────────
function editDates(id) {
  const o = ofs.find(x => x.id === id); if (!o) return;
  const {dates} = calcDates(o);
  const curIdx = STAGES.findIndex(s => s.id === o.stage);

  // Pour chaque étape : date d'entrée (stageEnteredAt) + date de fin (= entrée étape suivante ou override)
  const rows = STAGES.map((s, i) => {
    const isActive = i === curIdx;
    const isDone   = i < curIdx;
    const isFuture = i > curIdx;

    // Date d'entrée dans cette étape
    const enteredVal = o.stageEnteredAt?.[s.id] || '';
    // Date de fin de cette étape = date d'entrée de l'étape suivante
    const nextStage = STAGES[i+1];
    const finVal = nextStage ? (o.stageEnteredAt?.[nextStage.id] || '') : '';

    const rowBg = isActive ? 'var(--accent-light)' : 'var(--surface)';
    const labelColor = isDone ? 'var(--text-muted)' : isActive ? 'var(--accent-text)' : 'var(--text-faint)';

    return `<div style="background:${rowBg};border:1px solid ${isActive?'var(--accent)':'var(--border)'};border-radius:var(--radius);padding:12px 14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${isDone||isActive?'10px':'0'}">
        <span style="width:10px;height:10px;border-radius:50%;background:${s.color};flex-shrink:0"></span>
        <span style="font-size:13px;font-weight:${isActive?'600':'500'};color:${labelColor};flex:1">${s.label}</span>
        ${isActive?'<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--accent);color:#fff">EN COURS</span>':''}
        ${isDone?'<span style="font-size:10px;color:var(--text-faint)">✓ Terminé</span>':''}
        ${isFuture?'<span style="font-size:10px;color:var(--text-faint)">À venir</span>':''}
      </div>
      ${isDone||isActive ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">
            <i class="ti ti-calendar-plus" style="vertical-align:-2px;margin-right:4px"></i>Entrée en ${s.label}
          </div>
          <input type="date" id="date-enter-${s.id}" value="${enteredVal}"
            style="width:100%;padding:7px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none"
            oninput="syncNextEntry('${s.id}',this.value)">
        </div>
        ${nextStage && (isDone) ? `<div>
          <div style="font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">
            <i class="ti ti-calendar-check" style="vertical-align:-2px;margin-right:4px"></i>Sortie de ${s.label}
          </div>
          <input type="date" id="date-exit-${s.id}" value="${finVal}"
            style="width:100%;padding:7px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none"
            oninput="syncNextEntry2('${nextStage.id}',this.value)">
          <div style="font-size:10px;color:var(--text-faint);margin-top:3px">= Entrée en ${nextStage.label}</div>
        </div>` : '<div></div>'}
      </div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2><i class="ti ti-calendar-event" style="color:var(--accent);margin-right:8px"></i>Chronologie — ${o.id}</h2>
      <button class="close-btn" onclick="closeOverlay()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div style="font-size:12px;color:var(--text-faint);margin-bottom:12px;padding:8px 12px;background:var(--bg);border-radius:var(--radius);border:1px solid var(--border)">
        <i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:6px"></i>
        Modifie les dates d'entrée et de sortie de chaque étape. La date de sortie d'une étape correspond automatiquement à la date d'entrée de l'étape suivante.
      </div>
      ${rows}
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="resetDates('${id}')"><i class="ti ti-refresh"></i> Réinitialiser</button>
      <button class="btn" onclick="openDetail('${id}')">Annuler</button>
      <button class="btn btn-primary" onclick="saveDates('${id}')"><i class="ti ti-check"></i> Enregistrer</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

// Synchronise la date d'entrée d'une étape quand on modifie la sortie de la précédente
function syncNextEntry(stageId, val) {
  // Quand on change l'entrée d'une étape, met à jour la sortie de la précédente
  const idx = STAGES.findIndex(s => s.id === stageId);
  if (idx > 0) {
    const prevExit = document.getElementById('date-exit-' + STAGES[idx-1].id);
    if (prevExit && !prevExit.value) prevExit.value = val;
  }
}

function syncNextEntry2(nextStageId, val) {
  // Quand on change la sortie d'une étape, met à jour l'entrée de la suivante
  const nextInp = document.getElementById('date-enter-' + nextStageId);
  if (nextInp) nextInp.value = val;
}

function saveDates(id) {
  const o = ofs.find(x => x.id === id); if (!o) return;
  if (!o.stageEnteredAt) o.stageEnteredAt = {};

  STAGES.forEach(s => {
    const enterInp = document.getElementById('date-enter-' + s.id);
    if (enterInp !== null) {
      if (enterInp.value) o.stageEnteredAt[s.id] = enterInp.value;
      else delete o.stageEnteredAt[s.id];
    }
  });

  // La date de sortie d'une étape = date d'entrée de la suivante
  STAGES.forEach((s, i) => {
    const exitInp = document.getElementById('date-exit-' + s.id);
    if (exitInp && exitInp.value && STAGES[i+1]) {
      o.stageEnteredAt[STAGES[i+1].id] = exitInp.value;
    }
  });

  // Supprimer les anciens overrides (ancien système)
  STAGES.forEach(s => { delete o['dateOverride_' + s.id]; });

  closeOverlay();
  render();
  scheduleSave();
  showToast('Chronologie mise à jour');
}

function resetDates(id) {
  const o = ofs.find(x => x.id === id); if (!o) return;
  STAGES.forEach(s => { delete o['dateOverride_' + s.id]; });
  closeOverlay();
  render();
  scheduleSave();
  showToast('Dates réinitialisées');
}

    const risqueRows = risque.length ? risque.map(o=>{const s=stageOf(o.stage);const jA=joursEnAttente(o);const bloque=isBlocked(o);const raison=bloque?'En retard':jA>=2?`Att. ${jA}j`:'Non assigné';const rC=bloque?'#A32D2D':'#D4880A';const rBg=bloque?'#FCEBEB':'#FAEEDA';const cs=clientStyle(o.produit);return `<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s" onclick="openDetail('${o.id}')" onmouseenter="this.style.background='var(--accent-light)'" onmouseleave="this.style.background=''"><span style="font-size:11px;font-weight:700;color:var(--accent);width:80px;flex-shrink:0">${o.id}</span><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:${cs.bg};color:${cs.text};flex-shrink:0">${detectClientFull(o.produit)||'—'}</span><span style="font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.produit}</span><span style="font-size:10px;padding:2px 7px;border-radius:20px;background:${s?.bg};color:${s?.text};flex-shrink:0">${s?.label||o.stage}</span><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:${rBg};color:${rC};flex-shrink:0">${raison}</span><i class="ti ti-chevron-right" style="font-size:11px;color:var(--text-faint);flex-shrink:0"></i></div>`;}).join('') : '<div style="padding:16px;text-align:center;font-size:13px;color:var(--text-faint)"><i class="ti ti-circle-check" style="font-size:24px;display:block;margin:0 auto 8px;color:#1D9E75"></i>Aucun OF à risque</div>';

let _xlsxLoaded = false;
function loadXLSX(cb) {
  if (_xlsxLoaded) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = () => { _xlsxLoaded = true; cb(); };
  document.head.appendChild(s);
}

function readExcelFile(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    loadXLSX(() => {
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      cb(XLSX.utils.sheet_to_json(ws, {defval:null}));
    });
  };
  reader.readAsArrayBuffer(file);
}

function pcImport(type, input) {
  const file = input.files[0]; if (!file) return;
  const today = new Date().toLocaleDateString('fr-FR');
  showToast('Chargement ' + file.name + '…');
  readExcelFile(file, rows => {
    if (type === 'of')        { pcData.ofEnCours = rows;  pcData.lastImport.of = today; }
    if (type === 'stock')     { pcData.stock = rows;       pcData.lastImport.stock = today; }
    if (type === 'commandes') { pcData.commandes = rows;   pcData.lastImport.commandes = today; }
    showToast('✓ ' + rows.length + ' lignes importées');
    if (currentView === 'stock') renderStockPage();
    if (currentView === 'planning') renderPlanningComposite();
    input.value = '';
  });
}

// Construire la liste unique des CODART présents dans le stock

function pcCalcStock(codeLouxor) {
  // Même liste noire d'emplacements que pdpGetStockForWip (voir plus bas) — à tenir
  // synchronisée avec elle. Historiquement cette fonction avait sa propre liste
  // blanche à 2 emplacements (BSRTD1, BFRI01), qui ratait presque tout le stock réel
  // du Planning Composite (HPREP1/2, BPREP1/2/3, zones export, etc.), tout comme
  // pdpGetStockForWip avant sa correction.
  const EMPL_EXCLUS = [
    'CHARNC','ECONC','KATNC','NC','NCBLIS','QUALNC',
    'QUARCR','QUARCV','QUARKP','QUARLG','QUARLU','QUARPS','QUARQL','QUARSR',
    'SARNC','ZQUAL','ZREBUT',
  ];
  return pcData.stock
    .filter(r => {
      const art  = String(r.CODART||'').trim();
      const empl = String(r.EMPLAC||'').trim();
      return art === codeLouxor && !EMPL_EXCLUS.includes(empl);
    })
    .reduce((s,r) => s + (Number(r.QTEEMP)||0), 0);
}

function pcCalcOF(fg) {
  return pcData.ofEnCours
    .filter(r => String(r.CODART||'').trim() === String(fg||'').trim())
    .reduce((s,r) => s + (Number(r.QTEPRE)||0), 0);
}

function pcCalcCommandes(fg, client) {
  const fgStr = String(fg||'').trim();
  return pcData.commandes
    .filter(r => {
      const ref   = String(r.REF_RTD||'').trim();
      const ligne = String(r.LIGNE_CDE_||'').trim();
      const ok    = ref === fgStr && ligne === 'N';
      return client ? ok && String(r.CODCLI||'').trim() === client : ok;
    })
    .reduce((s,r) => s + (Number(r.QTE_CDE)||0), 0);
}

function pcCalcRows() {
  return pcData.correspondances.map(c => {
    const codeLouxor = String(c.code_louxor||'').trim();
    const fg         = String(c.fg||'').trim();
    const client     = String(c.client||'').trim();
    const stockWIP   = pcCalcStock(codeLouxor);
    const qteEnCours = pcCalcOF(fg);
    const stockVenir = stockWIP + qteEnCours;
    const commandes  = pcCalcCommandes(fg, client);
    const stockRest  = stockVenir - commandes;
    return { famille:c.famille, code:codeLouxor, fg, commentaire:c.commentaire, stockWIP, qteEnCours, stockVenir, commandes, stockRest };
  });
}

function pcExport() {
  const rows = pcCalcRows();
  const h = ['Famille','Code Article','FG','Commentaire','Stock WIP','En cours','Total dispo','Commandes','Stock restant'];
  const lines = [h.join(';')];
  rows.forEach(r => lines.push([r.famille,r.code,r.fg,r.commentaire,
    Math.round(r.stockWIP),Math.round(r.qteEnCours),Math.round(r.stockVenir),
    Math.round(r.commandes),Math.round(r.stockRest)].join(';')));
  const blob = new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');

  a.click();
  showToast('Export CSV téléchargé');

// Détecte, pour chaque codart, quelles zones sont réservées à un client à zone
// dédiée (CLIENT_STOCK_ZONES) et doivent donc être exclues du calcul de stock
// GÉNÉRAL (celui utilisé pour tous les autres clients). On ne peut pas exclure ces
// zones en bloc (BSRTD1 sert aussi à plein d'autres produits sans rapport) : on ne
// les exclut donc que pour les codarts qui font PARTIE de la chaîne d'un produit
// EFFECTIVEMENT commandé par ce client — détecté dynamiquement depuis les
// commandes elles-mêmes (REF_RTD + CODCLI), pas depuis une liste de produits
// maintenue à la main. Mémoïsé et invalidé si le nombre de commandes change.
let _pdpReservedZonesCache = null;
let _pdpReservedZonesCacheKey = null;
function pdpGetReservedZonesMap() {
  const nbCmd = (pcData.commandes || []).length;
  if (_pdpReservedZonesCache && _pdpReservedZonesCacheKey === nbCmd) return _pdpReservedZonesCache;

  const map = {}; // codart -> Set de zones à exclure du calcul général
  if (typeof CLIENT_STOCK_ZONES !== 'undefined' && typeof findNomenclatureByFG === 'function') {
    Object.keys(CLIENT_STOCK_ZONES).forEach(codeClient => {
      const zones = CLIENT_STOCK_ZONES[codeClient];
      // FG effectivement commandés par ce client (toutes commandes, pas seulement ouvertes :
      // une réservation de zone ne dépend pas du statut de la ligne de commande)
      const refsCommandees = new Set(
        (pcData.commandes || [])
          .filter(r => String(r.CODCLI||'').trim().toUpperCase() === codeClient)
          .map(r => String(r.REF_RTD||'').trim())
          .filter(Boolean)
      );
      refsCommandees.forEach(fg => {
        const nom = findNomenclatureByFG(fg);
        if (!nom || !nom.etapes) return;
        let blisterIdx = nom.etapes.findIndex(e => /BLIST/i.test(e.label||'') || /BLIST/i.test(e.codart||''));
        if (blisterIdx < 0) blisterIdx = 1;
        nom.etapes.forEach((e, i) => {
          if (i < blisterIdx) return; // tenon brut / étapes avant blister : jamais réservées
          const zList = (i === blisterIdx) ? zones.blister : zones.fg;
          if (!zList) return;
          if (!map[e.codart]) map[e.codart] = new Set();
          zList.forEach(z => map[e.codart].add(z));
        });
      });
    });
  }

  _pdpReservedZonesCache = map;
  _pdpReservedZonesCacheKey = nbCmd;
  return map;
}

function pdpGetStockForWip(codart) {
  // Liste officielle des emplacements à exclure du stock disponible (non-conforme,
  // quarantaine, destruction) — fournie par Stéphane le 07/07/2026. Tout le reste
  // du parc d'emplacements (BSRTD1, BFRI01, HPREP1/2, BPREP1/2/3, zones export
  // pays, etc.) est considéré comme du stock utile par défaut : c'est une liste
  // NOIRE, pas une liste blanche, pour ne pas perdre silencieusement une zone de
  // stockage qui n'aurait pas encore été ajoutée ici.
  const EMPL_EXCLUS = [
    'CHARNC',  // Non conforme OEM
    'ECONC',   // Non conforme Ecoparc
    'KATNC',   // Non conforme composite
    'NC',      // Non conforme usinage
    'NCBLIS',  // Blister produits non-conf
    'QUALNC',  // Non conforme qualité
    'QUARCR',  // Zone quarantaine réception
    'QUARCV',  // Zone quarantaine Charly
    'QUARKP',  // Zone quarantaine Katia
    'QUARLG',  // Zone quarantaine Loic
    'QUARLU',  // Zone quarantaine Philippe
    'QUARPS',  // Zone quarantaine Philippe
    'QUARQL',  // Zone quarantaine Qualité
    'QUARSR',  // Zone quarantaine Sarah
    'SARNC',   // Non conforme condi RTD
    'ZQUAL',   // Qualité
    'ZREBUT',  // Zone pour la destruction
  ];
  // Zones réservées à un client à zone dédiée pour CE codart précis (ex: le stock de
  // BLISTER_W41_MDR dans BSRTD1 est réservé à Chaoran) — exclues du calcul général
  // pour ne pas compter la même marchandise comme disponible pour tout le monde.
  const reserved = (typeof pdpGetReservedZonesMap === 'function') ? pdpGetReservedZonesMap()[codart] : null;

  return (pcData.stock || [])
    .filter(r => {
      const art  = String(r.CODART||'').trim();
      const empl = String(r.EMPLAC||'').trim();
      if (art !== codart) return false;
      if (EMPL_EXCLUS.includes(empl)) return false;
      if (reserved && reserved.has(empl)) return false;
      return true;
    })
    .reduce((s,r) => s + (Number(r.QTEEMP)||0), 0);
}

// ── Zones de stock réservées par client ────────────────────────────────────────
// Certains clients (export) ont une zone d'entrepôt dédiée : seul le stock qui s'y
// trouve peut réellement leur être livré. Clé = CODE CLIENT exact (colonne CODCLI
// de l'export commandes), pas le nom affiché (LIBFOU) — plus fiable, un même client
// peut apparaître sous plusieurs libellés légèrement différents selon les commandes.
// Ne s'applique qu'À PARTIR DU BLISTER (le tenon brut, et toute étape de
// transformation avant le blister comme un "tenon jointé", restent comptés sur tout
// le parc). La zone peut différer entre le niveau BLISTER lui-même et les niveaux
// suivants (FG) — ex: Chaoran a ses blisters dans BSRTD1 mais son FG dans BCHINE.
// Voir pdpGetTotalFGForRefZoned (pdp.js) qui applique cette distinction par niveau.
const CLIENT_STOCK_ZONES = {
  'CCH1228': { blister: ['BSRTD1'], fg: ['BCHINE'] },   // Chaoran (Chine)
  'ICE1103': { blister: ['BCANADA'], fg: ['BCANADA'] }, // Dentsply DNA (Canada) — zone blister à confirmer, reprise de la zone FG par défaut
};

// Trouve la config de zones réservées pour un CODE CLIENT exact, ou null si ce
// client n'a pas de restriction. Retourne {blister:[...], fg:[...]}.
function pdpGetZonesForClient(codeClient) {
  if (!codeClient) return null;
  return CLIENT_STOCK_ZONES[String(codeClient).trim().toUpperCase()] || null;
}

// Stock disponible d'un codart, restreint à une liste de zones (emplacements)
// données — contrairement à pdpGetStockForWip qui exclut seulement les zones
// non conformes/quarantaine et compte tout le reste.
function pdpGetStockForZone(codart, zones) {
  if (!zones || !zones.length) return 0;
  return (pcData.stock || [])
    .filter(r => {
      const art  = String(r.CODART||'').trim();
      const empl = String(r.EMPLAC||'').trim();
      return art === codart && zones.includes(empl);
    })
    .reduce((s,r) => s + (Number(r.QTEEMP)||0), 0);
}

function pdpGetEnCoursForWip(codart) {
  return (pcData.ofEnCours || [])
    .filter(r => String(r.CODART||'').trim() === codart)
    .reduce((s,r) => s + (Number(r.QTEPRE)||0), 0);
}

function pdpGetCommandesForRef(codartWip) {
  return (pcData.commandes || [])
    .filter(r => String(r.REF_RTD||'').trim() === codartWip && String(r.LIGNE_CDE_||'').trim() === 'N')
    .reduce((s,r) => s + ((Number(r.QTE_CDE)||0) - (Number(r.QTE_LIVREE)||0)), 0);
}

// ── Calcul stock réel pour une étape (tous emplacements pertinents)
function nomGetStock(codart) {
  const IGNORE = ['R&D','KATNC','ECHANT','SARNC','ECH','ZREBUT','NC','ECHANS'];
  return pcData.stock
    .filter(r => {
      const art  = String(r.CODART||'').trim();
      const empl = String(r.EMPLAC||'').trim();
      return art === codart && !IGNORE.some(e => empl === e);
    })
    .reduce((s,r) => s + (Number(r.QTEEMP)||0), 0);
}

// ── Calcul en-cours production pour une étape
function nomGetEnCours(codart) {
  return pcData.ofEnCours
    .filter(r => String(r.CODART||'').trim() === codart)
    .reduce((s,r) => s + (Number(r.QTEPRE)||0), 0);
}

// ── Calculer l'équivalent en produits finis d'un stock à une étape donnée
// étapes[i].ratio = combien de pièces étape i → 1 pièce étape i+1
function nomStockEnPF(stockBrut, etapes, indexEtape) {
  let val = stockBrut;
  for (let i = indexEtape; i < etapes.length - 1; i++) {
    const ratio = etapes[i].ratio;
    if (!ratio || ratio <= 0) return null;
    val = val / ratio;
  }
  return val;
}

// ── Recherche de nomenclature normalisée (point d'entrée UNIQUE) ───────────────
// Les codes d'un même article peuvent différer légèrement entre deux exports ERP
// (ex: "100.08_AG_JTR" côté stock vs "100.08AG_JTR" côté correspondances — un
// simple underscore de différence). Une comparaison stricte (===) rate alors la
// nomenclature alors qu'elle existe bel et bien, et l'app retombe silencieusement
// en mode "produit simple" (stock du seul niveau tapé, sans les niveaux amont).
// Toute recherche de nomenclature par code doit passer par ces deux fonctions —
// ne pas réimplémenter un .find() direct sur nomenclatures ailleurs.
function _normCodart(s) {
  return String(s||'').toUpperCase().replace(/[_\-\s%]/g, '');
}
function findNomenclatureByCodart(codart) {
  if (typeof nomenclatures === 'undefined' || !codart) return null;
  const target = _normCodart(codart);
  return nomenclatures.find(n => n && n.etapes && n.etapes.some(e => _normCodart(e.codart) === target)) || null;
}
function findNomenclatureByFG(code_client) {
  if (typeof nomenclatures === 'undefined' || !code_client) return null;
  const target = _normCodart(code_client);
  return nomenclatures.find(n => n && n.etapes && n.etapes.some(e => e.ratio === null && _normCodart(e.codart) === target)) || null;
}

// ── Trouver la nomenclature d'une référence
function nomFindByRef(codart) {
  const target = _normCodart(codart);
  return nomenclatures.filter(n =>
    n.etapes.some(e => _normCodart(e.codart) === target)
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// RENDU ARBORESCENCE dans l'onglet Stock
// ═══════════════════════════════════════════════════════════════════════════════

function renderNomenclatureTree(codart) {
  const noms = nomFindByRef(codart);
  if (!noms.length) return '';

  return noms.map(nom => {
    const etapes = nom.etapes;
    const selIdx = etapes.findIndex(e => e.codart === codart);

    const etapeHtml = etapes.map((e, i) => {
      const isSel    = i === selIdx;
      const isPrev   = i < selIdx;
      const isNext   = i > selIdx;
      const stock    = nomGetStock(e.codart);
      const enCours  = nomGetEnCours(e.codart);
      const total    = stock + enCours;
      const enPF     = nomStockEnPF(total, etapes, i);

      const borderCol = isSel ? 'var(--accent)' : isPrev ? '#27500A' : '#B5D4F4';
      const bgCol     = isSel ? 'var(--accent-light)' : 'var(--bg)';
      const labelCol  = isSel ? 'var(--accent-text)' : isPrev ? '#27500A' : 'var(--text-muted)';

      // Flèche entre étapes avec ratio
      const arrow = i < etapes.length - 1
        ? '<div style="display:flex;align-items:center;gap:6px;padding:4px 0 4px 20px">'
          +'<div style="width:2px;height:24px;background:var(--border-med)"></div>'
          +'<div style="font-size:10px;color:var(--text-faint);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px;white-space:nowrap">'
          +(e.ratio ? '÷ '+e.ratio+' → 1 '+(etapes[i+1]?.label?.split(' ')[0]||'') : '→')
          +'</div></div>'
        : '';

      return '<div onclick="stockSelectRef(\''+e.codart+'\')" style="cursor:pointer">'
        // Carte étape
        +'<div style="border:1.5px solid '+borderCol+';border-radius:var(--radius);padding:10px 14px;background:'+bgCol+';transition:all .15s"'
        +' onmouseenter="this.style.opacity=\'0.85\'" onmouseleave="this.style.opacity=\'1\'">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
        // Numéro étape
        +'<span style="width:20px;height:20px;border-radius:50%;background:'+borderCol+';color:'+(isSel?'#fff':'#fff')+';font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(i+1)+'</span>'
        +'<span style="font-size:12px;font-weight:'+(isSel?'700':'500')+';color:'+labelCol+';flex:1">'+e.label+'</span>'
        +(isSel?'<span style="font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--accent);color:#fff">EN COURS</span>':'')
        +'</div>'
        // Stats
        +'<div style="display:flex;gap:12px;flex-wrap:wrap">'
        +'<span style="font-size:11px;color:var(--text-muted)">Stock : <strong style="color:var(--text)">'+Math.round(stock).toLocaleString('fr')+'</strong></span>'
        +(enCours>0?'<span style="font-size:11px;color:var(--text-muted)">En prod : <strong style="color:#D4880A">'+Math.round(enCours).toLocaleString('fr')+'</strong></span>':'')
        +(enPF!==null?'<span style="font-size:11px;color:var(--text-muted);margin-left:auto">≈ <strong style="color:'+(isSel?'var(--accent)':'var(--text-muted)')+'">'+Math.round(enPF).toLocaleString('fr')+' PF</strong></span>':'')
        +'</div>'
        // Référence
        +'<div style="font-size:10px;font-family:monospace;color:var(--text-faint);margin-top:4px">'+e.codart+'</div>'
        +'</div>'
        + arrow
        +'</div>';
    }).join('');

    // Total équivalent PF toutes étapes
    const totalPF = etapes.reduce((sum, e, i) => {
      const t = nomGetStock(e.codart) + nomGetEnCours(e.codart);
      const pf = nomStockEnPF(t, etapes, i);
      return sum + (pf || 0);
    }, 0);

    return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">'
      // En-tête nomenclature
      +'<div style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)">'
      +'<div style="font-size:12px;font-weight:600;color:var(--text)"><i class="ti ti-hierarchy-2" style="vertical-align:-2px;margin-right:6px;color:var(--accent)"></i>'+nom.nom+'</div>'
      +'<div style="display:flex;gap:10px;align-items:center">'
      +'<span style="font-size:11px;color:var(--text-muted)">Total ≈ <strong style="color:var(--accent)">'+Math.round(totalPF).toLocaleString('fr')+' PF</strong></span>'
      +'<button class="btn" style="padding:3px 8px;font-size:10px" onclick="event.stopPropagation();openNomEditor(\''+nom.id+'\')"><i class="ti ti-edit"></i> Modifier</button>'
      +'</div></div>'
      // Arbre
      +'<div style="padding:14px 16px">'+etapeHtml+'</div>'
      +'</div>';
  }).join('<div style="height:10px"></div>');
}

function openNomEditor(nomId) {

  const editing = nom || { id: 'new_'+Date.now(), nom: '', etapes: [
    { codart:'', label:'', ratio: null },
    { codart:'', label:'', ratio: null },

      +'<td style="width:32px;text-align:center;font-size:11px;color:var(--text-faint);font-weight:600">'+(i+1)+'</td>'
      +'<td><input value="'+(e.codart||'')+'" placeholder="ex: TENON_W1_JTO" '

        +'style="width:100%;padding:5px 7px;border:1px solid var(--border-med);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px;font-family:var(--font)"></td>'
      +'<td style="width:130px">'
      +(i < total-1
        ? '<div style="display:flex;align-items:center;gap:4px">'
          +'<span style="font-size:11px;color:var(--text-faint);white-space:nowrap">÷</span>'
          +'<input type="number" min="1" value="'+(e.ratio!==null&&e.ratio!==undefined?e.ratio:'')+'" placeholder="ex: 10" '
          +'onchange="_nomEdit.etapes['+i+'].ratio=parseFloat(this.value)||null" '
          +'style="width:70px;padding:5px 7px;border:1px solid var(--border-med);border-radius:4px;background:var(--bg);color:var(--text);font-size:12px;font-family:monospace">'
          +'<span style="font-size:10px;color:var(--text-faint)">= 1 PF</span>'

        : '<span style="font-size:10px;color:var(--accent);font-weight:600">Produit fini</span>')
      +'</td>'
      +'<td style="width:36px"><button class="btn btn-danger" style="padding:3px 6px;font-size:11px" onclick="_nomDelEtape('+i+')"><i class="ti ti-trash"></i></button></td>'
      +'</tr>';
  }

  // Objet temporaire pour l'édition
  window._nomEdit = JSON.parse(JSON.stringify(editing));
  window._nomEditIsNew = isNew;

  function renderEditor() {
    const n = window._nomEdit;
    const rows = n.etapes.map((e,i) => etapeRow(e,i,n.etapes.length)).join('');
    document.getElementById('nom-editor-body').innerHTML =
      '<div style="margin-bottom:12px">'
      +'<label style="font-size:11px;font-weight:600;color:var(--text-muted);display:block;margin-bottom:4px">Nom de la nomenclature</label>'
      +'<input value="'+n.nom+'" placeholder="ex: W1 JTO — Chaîne complète" onchange="_nomEdit.nom=this.value" id="nom-name-inp"'
      +' style="width:100%;padding:8px 10px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none">'
      +'</div>'
      +'<div style="font-size:11px;color:var(--text-faint);margin-bottom:8px">'
      +'<i class="ti ti-info-circle" style="vertical-align:-2px;margin-right:5px"></i>'
      +'Le ratio ÷N signifie qu\'il faut N pièces de cette étape pour obtenir 1 pièce de l\'étape suivante.</div>'
      +'<div style="overflow-x:auto"><table class="cat-table" style="min-width:560px">'
      +'<thead><tr><th>#</th><th>Code Article (CODART)</th><th>Libellé étape</th><th>Ratio → étape suiv.</th><th></th></tr></thead>'
      +'<tbody>'+rows+'</tbody>'
      +'</table></div>'
      +'<button class="btn" style="margin-top:10px" onclick="_nomAddEtape()"><i class="ti ti-plus"></i> Ajouter une étape</button>';
  }

  window._nomAddEtape = function() {
    window._nomEdit.etapes.push({codart:'',label:'',ratio:null});
    renderEditor();
  };
  window._nomDelEtape = function(i) {
    window._nomEdit.etapes.splice(i,1);
    renderEditor();
  };

  document.getElementById('modal').innerHTML =
    '<div class="modal-header"><h2><i class="ti ti-hierarchy-2" style="color:var(--accent);margin-right:8px"></i>'
    +(isNew ? 'Nouvelle nomenclature' : 'Modifier — '+editing.nom)+'</h2>'
    +'<button class="close-btn" onclick="closeOverlay()"><i class="ti ti-x"></i></button></div>'
    +'<div class="modal-body" id="nom-editor-body"></div>'
    +'<div class="modal-footer">'
    +(!isNew?'<button class="btn btn-danger" onclick="_nomDelete(\''+editing.id+'\')"><i class="ti ti-trash"></i> Supprimer</button>':'')

    +'<button class="btn btn-primary" onclick="_nomSave()"><i class="ti ti-check"></i> Enregistrer</button>'
    +'</div>';
  document.getElementById('overlay').classList.add('open');
  renderEditor();
}

window._nomSave = function() {
  const n = window._nomEdit;
  if (!n.nom.trim()) { showToast('Donnez un nom à la nomenclature'); return; }
  if (window._nomEditIsNew) {
    nomenclatures.push(n);
  } else {
    const idx = nomenclatures.findIndex(x => x.id === n.id);
    if (idx >= 0) nomenclatures[idx] = n;
  }
  closeOverlay();
  if (currentView === 'stock') renderStockPage();
  showToast('Nomenclature enregistrée');
};
window._nomDelete = function(id) {
  if (!confirm('Supprimer cette nomenclature ?')) return;
  nomenclatures = nomenclatures.filter(n => n.id !== id);
  closeOverlay();
  if (currentView === 'stock') renderStockPage();
  showToast('Nomenclature supprimée');
};

}

function openCalculateur() {
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h2><i class="ti ti-ruler-2" style="color:var(--accent);margin-right:8px"></i>Calculateur de joncs</h2>
      <button class="close-btn" onclick="closeOverlay()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Référence produit</label>
          <div style="position:relative">
            <input id="calc-ref" placeholder="ex: W40, K09…" oninput="calcRefInput()" onkeydown="calcKeydown(event)" autocomplete="off"
              style="width:100%;padding:9px 12px;border:1px solid var(--border-med);border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none">
            <div id="calc-dropdown" style="display:none;position:fixed;background:var(--surface);border:1px solid var(--border-med);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:99999;max-height:200px;overflow-y:auto"></div>
          </div>
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;border-radius:50%;background:#4C8EDA;flex-shrink:0"></span>
            Quantité (pièces)
          </label>
          <input id="calc-qty" type="number" min="0" step="1" placeholder="ex: 20000" oninput="calcFromQty()"
            style="width:100%;padding:9px 12px;border:1px solid #B5D4F4;border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:5px">
            <span style="width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0"></span>
            Mètres de joncs
          </label>
          <input id="calc-metres" type="number" min="0" step="0.1" placeholder="ex: 560" oninput="calcFromMetres()"
            style="width:100%;padding:9px 12px;border:1px solid #9FE1CB;border-radius:var(--radius);background:var(--bg);color:var(--text);font-size:13px;font-family:var(--font);outline:none">
        </div>
      </div>
      <div id="calc-result" style="border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);display:none"></div>
      <div style="font-size:12px;color:var(--text-faint)">
        Entrez une quantité <strong>ou</strong> des mètres — l'autre valeur se calcule automatiquement.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeOverlay()">Fermer</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('calc-ref')?.focus(), 50);
}

let calcAcIdx = -1;

function calcRefInput() {
  calcAcIdx = -1;
  const q = (document.getElementById('calc-ref')?.value||'').trim().toLowerCase();
  const dd = document.getElementById('calc-dropdown');
  if (!dd) return;
  if (!q) { dd.style.display='none'; calcUpdate(); return; }
  const matches = catalogue
    .filter(c => c.ref.toLowerCase().includes(q))
    .sort((a,b) => {
      const aS = a.ref.toLowerCase().startsWith(q);
      const bS = b.ref.toLowerCase().startsWith(q);
      if (aS && !bS) return -1; if (!aS && bS) return 1;
      return a.ref.localeCompare(b.ref);
    }).slice(0,15);
  if (!matches.length) { dd.style.display='none'; calcUpdate(); return; }
  const esc = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  dd.innerHTML='';
  matches.forEach((c,i)=>{
    const hl=c.ref.replace(new RegExp('('+esc+')','gi'),'<mark style="background:transparent;color:var(--accent);font-weight:700">$1</mark>');
    const cs=clientStyle(c.ref); const client=detectClientFull(c.ref)||'';
    const item=document.createElement('div');
    item.className='calc-ac-item'; item.dataset.ref=c.ref; item.dataset.idx=i;
    item.style.cssText='padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)';
    item.innerHTML='<span style="flex:1;font-size:13px">'+hl+'</span>'
      +(client?'<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;background:'+cs.bg+';color:'+cs.text+'">'+client+'</span>':'')
      +(c.tc?'<span style="font-size:11px;color:var(--text-faint)">'+c.tc+'s</span>':'');
    item.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();});
    item.addEventListener('click',()=>{calcSelectRef(c.ref);});
    item.addEventListener('mouseenter',()=>{calcAcIdx=i;calcHighlight();});
    dd.appendChild(item);
  });
  // Positionner le dropdown en fixed sous l'input
  const inp2 = document.getElementById('calc-ref');
  if (inp2) {
    const rect = inp2.getBoundingClientRect();
    dd.style.top  = (rect.bottom + 4) + 'px';
    dd.style.left = rect.left + 'px';
    dd.style.width = rect.width + 'px';
  }
  dd.style.display = 'block';
  calcUpdate();
}

function calcHighlight() {
  document.querySelectorAll('.calc-ac-item').forEach((el,i)=>{
    el.style.background = i===calcAcIdx ? 'var(--accent-light)' : '';
  });
}

function calcKeydown(e) {
  const dd = document.getElementById('calc-dropdown');
  if (!dd || dd.style.display==='none') return;
  const items = dd.querySelectorAll('.calc-ac-item');
  if (e.key==='ArrowDown') { e.preventDefault(); calcAcIdx=Math.min(calcAcIdx+1,items.length-1); calcHighlight(); }
  else if (e.key==='ArrowUp') { e.preventDefault(); calcAcIdx=Math.max(calcAcIdx-1,0); calcHighlight(); }
  else if (e.key==='Enter') { e.preventDefault(); if(calcAcIdx>=0){ const ref=items[calcAcIdx]?.dataset.ref; if(ref) calcSelectRef(ref); } }
  else if (e.key==='Escape') { dd.style.display='none'; }
}

function calcSelectRef(ref) {
  const inp = document.getElementById('calc-ref');
  if (inp) inp.value = ref;
  const dd = document.getElementById('calc-dropdown');
  if (dd) dd.style.display = 'none';
  calcAcIdx = -1;
  calcUpdate();
  document.getElementById('calc-qty')?.focus();
}

let _calcUpdating = false;

function calcFromQty() {
  if (_calcUpdating) return;
  const ref = document.getElementById('calc-ref')?.value?.trim() || '';
  const qty = parseInt(document.getElementById('calc-qty')?.value) || 0;
  const entry = ref ? lookupCatalogueEntry(ref) : null;
  const tenons = entry?.tenons_ml;
  _calcUpdating = true;
  const inp = document.getElementById('calc-metres');
  if (inp) inp.value = (tenons && qty > 0) ? Math.ceil(qty / tenons * 10) / 10 : '';
  _calcUpdating = false;
  calcUpdate();
}

function calcFromMetres() {
  if (_calcUpdating) return;
  const ref = document.getElementById('calc-ref')?.value?.trim() || '';
  const metres = parseFloat(document.getElementById('calc-metres')?.value) || 0;
  const entry = ref ? lookupCatalogueEntry(ref) : null;
  const tenons = entry?.tenons_ml;
  _calcUpdating = true;
  const inp = document.getElementById('calc-qty');
  if (inp) inp.value = (tenons && metres > 0) ? Math.floor(metres * tenons) : '';
  _calcUpdating = false;
  calcUpdate();
}

function calcUpdate() {
  const ref = document.getElementById('calc-ref')?.value?.trim() || '';
  const qty = parseInt(document.getElementById('calc-qty')?.value) || 0;
  const metresVal = parseFloat(document.getElementById('calc-metres')?.value) || 0;
  const result = document.getElementById('calc-result');
  if (!result) return;
  if (!ref) { result.style.display='none'; return; }

  const entry = lookupCatalogueEntry(ref);
  if (!entry) {
    result.style.display='block';
    result.innerHTML = '<div style="padding:12px 14px;color:var(--text-faint);font-size:13px"><i class="ti ti-alert-circle"></i> Référence non trouvée dans le catalogue</div>';
    return;
  }

  const tc        = entry.tc;
  const tcTrs     = entry.tc_trs;
  const tenons    = entry.tenons_ml;
  const matiere   = entry.matiere;
  const machine   = entry.machine;
  const qtyFinal  = qty > 0 ? qty : (tenons && metresVal > 0 ? Math.floor(metresVal * tenons) : 0);
  const metresFinal = tenons && qtyFinal > 0 ? Math.ceil(qtyFinal / tenons * 10) / 10 : null;
  const heures    = qtyFinal > 0 && tc ? (qtyFinal * tc) / 3600 : null;
  const heuresTrs = qtyFinal > 0 && tcTrs ? (qtyFinal * tcTrs) / 3600 : null;

  const row = (icon, label, value, color=null) =>
    `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:${color?'var(--accent-light)':'var(--bg)'}">
      <i class="ti ${icon}" style="color:${color||'var(--text-faint)'};font-size:15px;flex-shrink:0"></i>
      <span style="font-size:12px;color:var(--text-muted);flex:1">${label}</span>
      <span style="font-size:${color?'15':'13'}px;font-weight:${color?700:500};color:${color||'var(--text)'}">${value}</span>
    </div>`;

  result.style.display = 'block';
  result.innerHTML = [
    row('ti-tag', 'Référence', entry.ref),
    matiere ? row('ti-cylinder', 'Matière', matiere) : '',
    machine ? row('ti-tool', 'Machine', machine) : '',
    tc ? row('ti-clock', 'Temps cycle', tc + 's/u' + (tcTrs ? ` (TRS: ${tcTrs}s)` : '')) : '',
    tenons ? row('ti-stack-2', 'Tenons par ML', tenons.toFixed(1) + ' /ML') : row('ti-alert-circle', 'Tenons par ML', 'Non disponible — catalogue à mettre à jour'),
    metresFinal !== null ? row('ti-ruler-2', 'Mètres de joncs', metresFinal.toLocaleString('fr') + ' m', '#1D9E75') : '',
    qtyFinal > 0 && tenons ? row('ti-stack-2', 'Quantité de pièces', qtyFinal.toLocaleString('fr') + ' pièces', '#4C8EDA') : '',
    heures !== null ? row('ti-hourglass', "Durée d'usinage estimée", (()=>{
      const j = Math.ceil(heures / HEURES_PAR_JOUR);
      const h = Math.round(heures * 10) / 10;
      return j + 'j (' + h + 'h)';
    })()) : '',
  ].filter(Boolean).join('');
}

// Appliquer les préférences PDP maintenant que pdp.js est chargé
if (window._pdpPrefsToRestore) {
  const p = window._pdpPrefsToRestore;
  if (p.names && typeof pdpCustomNames !== 'undefined') Object.assign(pdpCustomNames, p.names);
  if (p.order && typeof pdpCustomOrder !== 'undefined') Object.assign(pdpCustomOrder, p.order);
  if (p.deleted && typeof pdpDeletedRefs !== 'undefined') {
    p.deleted.forEach(r => { if (!pdpDeletedRefs.includes(r)) pdpDeletedRefs.push(r); });
  }
  delete window._pdpPrefsToRestore;
}
// Re-render si on était sur une vue PDP/Stock pendant le chargement différé
if (typeof currentView !== 'undefined' && (currentView === 'pdp' || currentView === 'stock')) {
  render();
}
